name: nasa-space-post

"on":
  workflow_dispatch:
    inputs:
      caption:
        description: "Post caption (leave empty for random)"
        required: false
        default: ""
  schedule:
   # - cron: "0 14 * * *"

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: install-deps
        timeout-minutes: 3
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg bc jq python3 yt-dlp

      - name: find-video
        id: vid
        timeout-minutes: 2
        env:
          PIXABAY_KEY: "50973339-3e27fd59ddfd9c68378e78753"
        run: |
          set -e
          CLIP=25
          SKIP_HEAD=15
          SKIP_TAIL=10
          MIN_DUR=$((SKIP_HEAD + CLIP + SKIP_TAIL))
          VIDEO_URL=""
          
          # ------- NASA FIRST -------
          echo "Trying NASA search pages..."
          
          NASA_PAGES=(
            "https://images.nasa.gov/search?q=earth&page=1&media=video"
            "https://images.nasa.gov/search?q=space%20walk&page=1&media=video"
            "https://images.nasa.gov/search?q=rocket%20launch&page=1&media=video"
            "https://images.nasa.gov/search?q=iss&page=1&media=video"
            "https://images.nasa.gov/search?q=moon&page=1&media=video"
            "https://images.nasa.gov/search?q=mars&page=1&media=video"
            "https://images.nasa.gov/search?q=galaxy&page=1&media=video"
            "https://images.nasa.gov/search?q=nebula&page=1&media=video"
            "https://images.nasa.gov/search?q=astronaut&page=1&media=video"
            "https://images.nasa.gov/search?q=sun&page=1&media=video"
            "https://images.nasa.gov/search?q=aurora&page=1&media=video"
            "https://images.nasa.gov/search?q=hubble&page=1&media=video"
            "https://images.nasa.gov/search?q=webb&page=1&media=video"
          )
          
          NASA_PAGES=($(printf "%s\n" "${NASA_PAGES[@]}" | shuf))
          
          for PAGE in "${NASA_PAGES[@]}"; do
            echo "Checking NASA: $PAGE"
            
            HTML=$(timeout 10 curl -sf --max-time 10 "$PAGE" 2>/dev/null) || continue
            
            VIDEO_LINKS=$(echo "$HTML" | grep -o '"/video/[^"]*"' | sed 's/"//g' | sort -u | head -10)
            
            for VID_PATH in $VIDEO_LINKS; do
              DETAIL_URL="https://images.nasa.gov$VID_PATH"
              DETAIL_HTML=$(timeout 10 curl -sf --max-time 10 "$DETAIL_URL" 2>/dev/null) || continue
              
              VURL=$(echo "$DETAIL_HTML" | grep -o 'https://[^"]*\.mp4' | head -1)
              
              if [ -z "$VURL" ]; then
                YT_ID=$(echo "$DETAIL_HTML" | grep -o 'youtube\.com/embed/[^"?]*' | cut -d'/' -f3 | head -1)
                if [ -n "$YT_ID" ]; then
                  VURL=$(yt-dlp -g "https://youtube.com/watch?v=$YT_ID" 2>/dev/null | head -1)
                fi
              fi
              
              if [ -n "$VURL" ]; then
                # Get duration
                if command -v yt-dlp &>/dev/null && [ -n "$YT_ID" ]; then
                  DUR=$(yt-dlp --get-duration "https://youtube.com/watch?v=$YT_ID" 2>/dev/null | \
                        awk -F: '{ if (NF==1) print $1; else if (NF==2) print ($1*60)+$2; else print ($1*3600)+($2*60)+$3 }')
                else
                  # Try ffprobe
                  DUR=$(ffprobe -v error -show_entries format=duration -of csv=p=0 "$VURL" 2>/dev/null | cut -d. -f1)
                fi
                
                [ -z "$DUR" ] && DUR=60
                
                if [ "$DUR" -ge "$MIN_DUR" ]; then
                  ZONE_END=$((DUR - SKIP_TAIL - CLIP))
                  RANGE=$((ZONE_END - SKIP_HEAD))
                  if [ "$RANGE" -gt 0 ]; then
                    START=$((SKIP_HEAD + RANDOM % RANGE))
                    VIDEO_URL="$VURL"
                    echo "video_url=$VIDEO_URL" >> "$GITHUB_OUTPUT"
                    echo "start=$START" >> "$GITHUB_OUTPUT"
                    echo "clip=$CLIP" >> "$GITHUB_OUTPUT"
                    echo "тЬЕ Found NASA video: start=${START}s clip=${CLIP}s"
                    break 4
                  fi
                fi
              fi
            done
          done

          # ------- PIXABAY SPACE FALLBACK -------
          if [ -z "$VIDEO_URL" ]; then
            echo "NASA failed - trying Pixabay space videos..."
            
            TERMS="galaxy|nebula|stars|universe|milky way|planet|earth from space|moon|mars|astronaut|spacewalk|rocket launch|space shuttle|spacecraft|solar system|deep space|cosmos|night sky stars|space station|solar flare|black hole|comet|asteroid|space telescope"
            IFS='|' read -ra TERM_ARR <<< "$TERMS"
            for TERM in $(printf "%s\n" "${TERM_ARR[@]}" | shuf); do
              PAGE=$((RANDOM % 5 + 1))
              ENCODED=$(python3 -c "import urllib.parse; print(urllib.parse.quote('$TERM'))")
              URL="https://pixabay.com/api/videos/?key=${PIXABAY_KEY}&q=${ENCODED}&video_type=film&per_page=20&page=${PAGE}"
              RESP=$(timeout 10 curl -sf "$URL" 2>/dev/null) || continue
              COUNT=$(echo "$RESP" | jq -r '.hits | length' 2>/dev/null) || continue
              [ "$COUNT" -eq 0 ] && continue
              for i in $(seq 0 $((COUNT - 1)) | shuf); do
                DUR=$(echo "$RESP" | jq -r ".hits[$i].duration" 2>/dev/null)
                [[ "$DUR" =~ ^[0-9]+$ ]] || continue
                [ "$DUR" -lt "$MIN_DUR" ] && continue
                VURL=$(echo "$RESP" | jq -r ".hits[$i].videos.large.url // .hits[$i].videos.medium.url // .hits[$i].videos.small.url" 2>/dev/null)
                [ -z "$VURL" ] || [ "$VURL" = "null" ] && continue
                ZONE_END=$((DUR - SKIP_TAIL - CLIP))
                RANGE=$((ZONE_END - SKIP_HEAD))
                [ "$RANGE" -le 0 ] && continue
                START=$((SKIP_HEAD + RANDOM % RANGE))
                VIDEO_URL="$VURL"
                echo "video_url=$VIDEO_URL" >> "$GITHUB_OUTPUT"
                echo "start=$START" >> "$GITHUB_OUTPUT"
                echo "clip=$CLIP" >> "$GITHUB_OUTPUT"
                echo "тЬЕ Found Pixabay space video"
                break 3
              done
            done
          fi

          if [ -z "$VIDEO_URL" ]; then
            echo "тЭМ No video found from any source"
            exit 1
          fi

      - name: pick-music
        id: music
        run: |
          if [ ! -d "bgmusic" ] || [ -z "$(ls -A bgmusic 2>/dev/null)" ]; then
            echo "тЭМ No music folder or files"
            exit 1
          fi
          
          # Find ANY audio file
          FILES=()
          while IFS= read -r file; do
            FILES+=("$file")
          done < <(find bgmusic -type f \( -iname "*.mp3" -o -iname "*.wav" -o -iname "*.m4a" -o -iname "*.mp4" -o -iname "*.aac" -o -iname "*.ogg" -o -iname "*.flac" -o -iname "*.m4p" \) 2>/dev/null || true)
          
          if [ ${#FILES[@]} -eq 0 ]; then
            echo "тЭМ No music files found"
            exit 1
          fi
          
          RANDOM_FILE="${FILES[$RANDOM % ${#FILES[@]}]}"
          echo "music_file=$RANDOM_FILE" >> "$GITHUB_OUTPUT"
          echo "Selected: $RANDOM_FILE"

      - name: pick-caption
        id: caption
        run: |
          INPUT="${{ github.event.inputs.caption }}"
          if [ -n "$INPUT" ]; then
            echo "caption=$INPUT" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          CAPTIONS=(
            "Journey through the cosmos. ЁЯММ #Space #NASA"
            "The universe is beautiful. тЬи #Space #Galaxy"
            "Look up and wonder. ЁЯФн #Space #Stars"
            "We are made of star stuff. ЁЯТл #Space #Cosmos"
            "Beyond our blue sky. ЁЯМН #Space #Earth"
            "Infinite beauty. ЁЯМа #Space #Nebula"
            "The final frontier. ЁЯЪА #Space #Exploration"
            "Dance of the galaxies. тЬи #Space #Astronomy"
            "Silence of space. ЁЯдН #Space #Peace"
            "Our place in the universe. ЁЯМО #Space #NASA"
            "Stardust and dreams. ЁЯТл #Space #Galaxy"
            "Cosmic wonders. ЁЯММ #Space #Nebula"
            "The pale blue dot. ЁЯМН #Space #CarlSagan"
            "Endless possibilities. тЬи #Space #Universe"
            "Breathtaking beauty. ЁЯМа #Space #NASA"
            "Celestial dreams. ЁЯТл #Space #Stars"
            "The cosmos awaits. ЁЯММ #Space #Universe"
            "In awe of it all. ЁЯдН #Space #Cosmic"
            "Light years away. тЬи #Space #Galaxy"
            "Space: the silent symphony. ЁЯО╡ #Space #NASA"
            "Earthrise. ЁЯМН #Space #Apollo #NASA"
            "Tranquility Base here. ЁЯМХ #Space #Moon #NASA"
            "The Eagle has landed. ЁЯЪА #Space #NASA #History"
            "One small step. ЁЯСитАНЁЯЪА #Space #NASA #Moon"
            "Pale blue dot. ЁЯТЩ #Space #CarlSagan #Earth"
            "The overview effect. ЁЯМО #Space #NASA #Earth"
            "Our home. ЁЯПа #Space #Earth #NASA"
            "Stargazing. тЬи #Space #Stars #NightSky"
            "Cosmic perspective. ЁЯФн #Space #Universe #NASA"
            "Wonder and awe. ЁЯММ #Space #Cosmos #NASA"
          )
          RANDOM_CAPTION=${CAPTIONS[$RANDOM % ${#CAPTIONS[@]}]}
          echo "caption=$RANDOM_CAPTION" >> "$GITHUB_OUTPUT"
          echo "Picked: $RANDOM_CAPTION"

      - name: process-video
        timeout-minutes: 3
        run: |
          URL="${{ steps.vid.outputs.video_url }}"
          START="${{ steps.vid.outputs.start }}"
          DUR="${{ steps.vid.outputs.clip }}"
          MUSIC="${{ steps.music.outputs.music_file }}"
          FETCH=$(echo "$DUR + 5" | bc)
          FADEOUT=$(echo "$DUR - 1.5" | bc)
          
          echo "Downloading video segment..."
          # Try fast copy first
          if ! timeout 60 ffmpeg -hide_banner -loglevel error -y -ss "$START" -i "$URL" -t "$FETCH" -c copy source.mp4; then
            echo "Fast copy failed - retrying with re-encode..."
            timeout 90 ffmpeg -hide_banner -loglevel error -y -ss "$START" -i "$URL" -t "$FETCH" \
              -c:v libx264 -preset fast -crf 23 -pix_fmt yuv420p -c:a aac source.mp4
          fi
          
          # Check if video has video stream
          HAS_VIDEO=$(ffprobe -v error -select_streams v:0 -show_entries stream=codec_type -of csv=p=0 source.mp4 2>/dev/null || echo "")
          if [ -z "$HAS_VIDEO" ]; then
            echo "тЭМ No video stream - download failed"
            exit 1
          fi
          
          echo "Extracting music segment (any format)..."
          # Convert ANY audio format to standard AAC
          timeout 30 ffmpeg -hide_banner -loglevel error -y -i "$MUSIC" -t "$DUR" \
            -af "afade=t=in:st=0:d=1,afade=t=out:st=${FADEOUT}:d=1.5" \
            -c:a aac -b:a 192k music.m4a

          echo "Creating final vertical video..."
          timeout 120 ffmpeg -hide_banner -loglevel error -y \
            -i source.mp4 -i music.m4a \
            -filter_complex "[0:v]scale=1080:1920:force_original_aspect_ratio=increase,crop=1080:1920,fade=t=in:st=0:d=1,fade=t=out:st=${FADEOUT}:d=1.5,format=yuv420p[v]" \
            -map "[v]" -map 1:a \
            -c:v libx264 -preset fast -crf 18 \
            -c:a aac -b:a 192k \
            -movflags +faststart -t "$DUR" final.mp4
          
          if [ ! -f final.mp4 ] || [ ! -s final.mp4 ]; then
            echo "тЭМ Final video creation failed"
            exit 1
          fi
          
          ls -lh final.mp4
          echo "тЬЕ Video processed successfully"

      - name: post-to-facebook
        timeout-minutes: 2
        env:
          PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          PAGE_TOKEN: ${{ secrets.FB_PAGE_TOKEN }}
          CAPTION: ${{ steps.caption.outputs.caption }}
        run: |
          set -e
          FILE="final.mp4"
          if [ ! -f "$FILE" ]; then
            echo "тЭМ No video file"
            exit 1
          fi
          
          SIZE=$(stat -c%s "$FILE")
          API="https://graph.facebook.com/v19.0"
          
          echo "Starting video upload..."
          INIT=$(timeout 15 curl -sf -X POST "${API}/${PAGE_ID}/video_reels" \
            -H "Content-Type: application/json" \
            -d "{\"upload_phase\":\"start\",\"access_token\":\"${PAGE_TOKEN}\"}")
          
          SESSION=$(echo "$INIT" | jq -r '.upload_session_id')
          VID_ID=$(echo "$INIT" | jq -r '.video_id')
          
          if [ "$SESSION" = "null" ] || [ -z "$SESSION" ]; then
            echo "Reels failed тАФ trying videos endpoint..."
            INIT=$(timeout 15 curl -sf -X POST "${API}/${PAGE_ID}/videos" \
              -H "Content-Type: application/json" \
              -d "{\"upload_phase\":\"start\",\"file_size\":${SIZE},\"access_token\":\"${PAGE_TOKEN}\"}")
            
            SESSION=$(echo "$INIT" | jq -r '.upload_session_id')
            VID_ID=$(echo "$INIT" | jq -r '.video_id')
            S_OFF=$(echo "$INIT" | jq -r '.start_offset')
            
            if [ "$SESSION" = "null" ] || [ -z "$SESSION" ]; then
              echo "тЭМ Both endpoints failed: $INIT"
              exit 1
            fi
            
            echo "Uploading video chunk..."
            timeout 60 curl -sf -X POST "${API}/${PAGE_ID}/videos" \
              -F "upload_phase=transfer" \
              -F "upload_session_id=${SESSION}" \
              -F "start_offset=${S_OFF}" \
              -F "video_file_chunk=@${FILE};type=video/mp4" \
              -F "access_token=${PAGE_TOKEN}" > /dev/null
            
            echo "Finishing upload..."
            FINISH=$(timeout 15 curl -sf -X POST "${API}/${PAGE_ID}/videos" \
              -H "Content-Type: application/json" \
              -d "{\"upload_phase\":\"finish\",\"upload_session_id\":\"${SESSION}\",\"description\":\"${CAPTION}\",\"published\":true,\"access_token\":\"${PAGE_TOKEN}\"}")
          else
            UPLOAD_URL=$(echo "$INIT" | jq -r '.upload_url')
            
            echo "Uploading to: $UPLOAD_URL"
            timeout 60 curl -sf -X POST "$UPLOAD_URL" \
              -H "Authorization: OAuth ${PAGE_TOKEN}" \
              -H "offset: 0" \
              -H "file_size: ${SIZE}" \
              --data-binary "@${FILE}" > /dev/null
            
            echo "Finishing reel upload..."
            FINISH=$(timeout 15 curl -sf -X POST "${API}/${PAGE_ID}/video_reels" \
              -H "Content-Type: application/json" \
              -d "{\"upload_phase\":\"finish\",\"video_id\":\"${VID_ID}\",\"description\":\"${CAPTION}\",\"published\":true,\"access_token\":\"${PAGE_TOKEN}\"}")
          fi
          
          echo "Result: $FINISH"
          OK=$(echo "$FINISH" | jq -r '.success // .id // empty')
          
          if [ -z "$OK" ]; then
            echo "тЭМ Publish failed: $FINISH"
            exit 1
          fi
          
          echo "тЬЕ Posted! Video ID: $VID_ID"