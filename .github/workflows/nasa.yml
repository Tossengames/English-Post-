name: still-moments-post-x1

"on":
  workflow_dispatch:
    inputs:
      caption:
        description: "Post caption (leave empty for random)"
        required: false
        default: ""
  schedule:
    - cron: "0 14 * * *"

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: install-deps
        timeout-minutes: 3
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg bc jq python3 yt-dlp

      - name: find-video
        id: vid
        timeout-minutes: 2
        env:
          PIXABAY_KEY: "50973339-3e27fd59ddfd9c68378e78753"
        run: |
          set -e
          CLIP=25
          SKIP_HEAD=15
          SKIP_TAIL=10
          MIN_DUR=$((SKIP_HEAD + CLIP + SKIP_TAIL))
          VIDEO_URL=""
          
          # ------- NASA FIRST -------
          echo "Trying NASA search pages..."
          
          NASA_PAGES=(
            "https://images.nasa.gov/search?q=earth&page=1&media=video"
            "https://images.nasa.gov/search?q=space%20walk&page=1&media=video"
            "https://images.nasa.gov/search?q=rocket%20launch&page=1&media=video"
            "https://images.nasa.gov/search?q=iss&page=1&media=video"
            "https://images.nasa.gov/search?q=moon&page=1&media=video"
            "https://images.nasa.gov/search?q=mars&page=1&media=video"
            "https://images.nasa.gov/search?q=galaxy&page=1&media=video"
            "https://images.nasa.gov/search?q=nebula&page=1&media=video"
            "https://images.nasa.gov/search?q=astronaut&page=1&media=video"
          )
          
          NASA_PAGES=($(printf "%s\n" "${NASA_PAGES[@]}" | shuf))
          
          for PAGE in "${NASA_PAGES[@]}"; do
            echo "Checking NASA: $PAGE"
            
            HTML=$(timeout 10 curl -sf --max-time 10 "$PAGE" 2>/dev/null) || continue
            
            VIDEO_LINKS=$(echo "$HTML" | grep -o '"/video/[^"]*"' | sed 's/"//g' | sort -u | head -10)
            
            for VID_PATH in $VIDEO_LINKS; do
              DETAIL_URL="https://images.nasa.gov$VID_PATH"
              DETAIL_HTML=$(timeout 10 curl -sf --max-time 10 "$DETAIL_URL" 2>/dev/null) || continue
              
              VURL=$(echo "$DETAIL_HTML" | grep -o 'https://[^"]*\.mp4' | head -1)
              
              if [ -z "$VURL" ]; then
                YT_ID=$(echo "$DETAIL_HTML" | grep -o 'youtube\.com/embed/[^"?]*' | cut -d'/' -f3 | head -1)
                if [ -n "$YT_ID" ]; then
                  VURL=$(yt-dlp -g "https://youtube.com/watch?v=$YT_ID" 2>/dev/null | head -1)
                fi
              fi
              
              if [ -n "$VURL" ]; then
                VIDEO_URL="$VURL"
                START=$SKIP_HEAD
                echo "video_url=$VIDEO_URL" >> "$GITHUB_OUTPUT"
                echo "start=$START" >> "$GITHUB_OUTPUT"
                echo "clip=$CLIP" >> "$GITHUB_OUTPUT"
                echo "✅ Found NASA video"
                break 3
              fi
            done
          done

          # ------- PIXABAY FALLBACK -------
          if [ -z "$VIDEO_URL" ]; then
            echo "NASA failed - trying Pixabay..."
            
            TERMS="galaxy|nebula|stars|universe|planet|astronaut|space"
            IFS='|' read -ra TERM_ARR <<< "$TERMS"
            
            for TERM in $(printf "%s\n" "${TERM_ARR[@]}" | shuf); do
              PAGE=$((RANDOM % 3 + 1))
              ENCODED=$(python3 -c "import urllib.parse; print(urllib.parse.quote('$TERM'))")
              URL="https://pixabay.com/api/videos/?key=${PIXABAY_KEY}&q=${ENCODED}&video_type=film&per_page=20&page=${PAGE}"
              RESP=$(timeout 10 curl -sf "$URL" 2>/dev/null) || continue
              
              VURL=$(echo "$RESP" | jq -r '.hits[]?.videos.large.url' | shuf -n 1)
              
              if [ -n "$VURL" ] && [ "$VURL" != "null" ]; then
                VIDEO_URL="$VURL"
                START=$SKIP_HEAD
                echo "video_url=$VIDEO_URL" >> "$GITHUB_OUTPUT"
                echo "start=$START" >> "$GITHUB_OUTPUT"
                echo "clip=$CLIP" >> "$GITHUB_OUTPUT"
                echo "✅ Found Pixabay video"
                break
              fi
            done
          fi

          if [ -z "$VIDEO_URL" ]; then
            echo "❌ No video found"
            exit 1
          fi

      - name: pick-music
        id: music
        run: |
          if [ ! -d "bgmusic" ] || [ -z "$(ls -A bgmusic)" ]; then
            echo "❌ No music folder or files"
            exit 1
          fi
          cd bgmusic
          FILES=(*.mp3 *.wav 2>/dev/null)
          if [ ${#FILES[@]} -eq 0 ]; then
            echo "❌ No music files"
            exit 1
          fi
          RANDOM_FILE=${FILES[$RANDOM % ${#FILES[@]}]}
          echo "music_file=bgmusic/$RANDOM_FILE" >> "$GITHUB_OUTPUT"
          echo "Selected: $RANDOM_FILE"

      - name: pick-caption
        id: caption
        run: |
          INPUT="${{ github.event.inputs.caption }}"
          if [ -n "$INPUT" ]; then
            echo "caption=$INPUT" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          CAPTIONS=(
            "Journey through the cosmos. 🌌 #Space #NASA"
            "The universe is beautiful. ✨ #Space #Galaxy"
            "Look up and wonder. 🔭 #Space #Stars"
            "We are made of star stuff. 💫 #Space #Cosmos"
            "Beyond our blue sky. 🌍 #Space #Earth"
            "Infinite beauty. 🌠 #Space #Nebula"
            "The final frontier. 🚀 #Space #Exploration"
            "Dance of the galaxies. ✨ #Space #Astronomy"
            "Silence of space. 🤍 #Space #Peace"
            "Our place in the universe. 🌎 #Space #NASA"
            "Stardust and dreams. 💫 #Space #Galaxy"
            "Cosmic wonders. 🌌 #Space #Nebula"
            "The pale blue dot. 🌍 #Space #CarlSagan"
            "Endless possibilities. ✨ #Space #Universe"
            "Breathtaking beauty. 🌠 #Space #NASA"
            "Celestial dreams. 💫 #Space #Stars"
            "The cosmos awaits. 🌌 #Space #Universe"
            "In awe of it all. 🤍 #Space #Cosmic"
            "Light years away. ✨ #Space #Galaxy"
            "Space: the silent symphony. 🎵 #Space #NASA"
          )
          RANDOM_CAPTION=${CAPTIONS[$RANDOM % ${#CAPTIONS[@]}]}
          echo "caption=$RANDOM_CAPTION" >> "$GITHUB_OUTPUT"
          echo "Picked: $RANDOM_CAPTION"

      - name: process-video
        timeout-minutes: 3
        run: |
          URL="${{ steps.vid.outputs.video_url }}"
          START="${{ steps.vid.outputs.start }}"
          DUR="${{ steps.vid.outputs.clip }}"
          MUSIC="${{ steps.music.outputs.music_file }}"
          
          echo "Downloading video..."
          if ! timeout 60 ffmpeg -ss "$START" -i "$URL" -t "$DUR" -c:v libx264 -preset fast -crf 23 -pix_fmt yuv420p -c:a aac source.mp4; then
            echo "❌ Download failed"
            exit 1
          fi

          echo "Extracting music segment..."
          timeout 30 ffmpeg -i "$MUSIC" -t "$DUR" -af "afade=t=in:st=0:d=1,afade=t=out:st=$(echo "$DUR - 1.5" | bc):d=1.5" -c:a aac music.mp3

          echo "Creating final video..."
          timeout 120 ffmpeg -i source.mp4 -i music.mp3 \
            -filter_complex "[0:v]scale=1080:1920:force_original_aspect_ratio=increase,crop=1080:1920,fade=t=in:st=0:d=1,fade=t=out:st=$(echo "$DUR - 1.5" | bc):d=1.5[v]" \
            -map "[v]" -map 1:a \
            -c:v libx264 -preset fast -crf 18 -c:a aac -b:a 192k -movflags +faststart -pix_fmt yuv420p -t "$DUR" final.mp4

          if [ ! -f final.mp4 ]; then
            echo "❌ Final video creation failed"
            exit 1
          fi
          
          ls -lh final.mp4

      - name: post-to-facebook
        timeout-minutes: 2
        env:
          PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          PAGE_TOKEN: ${{ secrets.FB_PAGE_TOKEN }}
          CAPTION: ${{ steps.caption.outputs.caption }}
        run: |
          FILE="final.mp4"
          if [ ! -f "$FILE" ]; then
            echo "❌ No video file"
            exit 1
          fi
          
          echo "Posting to Facebook..."
          curl -X POST "https://graph.facebook.com/v19.0/${{ secrets.FB_PAGE_ID }}/video_reels" \
            -F "source=@$FILE" \
            -F "description=$CAPTION" \
            -F "access_token=${{ secrets.FB_PAGE_TOKEN }}" \
            --progress-bar | tee result.json
          
          if grep -q "error" result.json; then
            echo "❌ Post failed"
            cat result.json
            exit 1
          fi
          
          echo "✅ Posted successfully!"