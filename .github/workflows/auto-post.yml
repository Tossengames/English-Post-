name: Auto Post to Facebook (Text Only)

on:
  schedule:
    - cron: "0 8,18 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: 3.11

    - name: Install dependencies
      run: |
        pip install requests

    - name: Run posting script
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
        FB_PAGE_TOKEN: ${{ secrets.FB_PAGE_TOKEN }}
      run: python post_to_facebook.py

    - name: Commit post state
      run: |
        git config --global user.email "actions@github.com"
        git config --global user.name "Auto Post Bot"
        git add post_state.json
        git commit -m "🔄 Updated post type index"
        git push
      continue-on-error: true
