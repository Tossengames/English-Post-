name: Auto Post to Facebook (Single Page, Gemini 1.0)

on:
  schedule:
    - cron: "0 8,18 * * *"  # Twice daily UTC
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: 3.11

    - name: Install dependencies
      run: |
        pip install -r requirements.txt

    - name: Run post script
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        FB_PAGE_TOKEN: ${{ secrets.FB_PAGE_TOKEN }}
        FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
        PIXABAY_KEY: ${{ secrets.PIXABAY_KEY }}
      run: python post_to_facebook.py

    - name: Commit post state
      run: |
        git config --global user.email "actions@github.com"
        git config --global user.name "Auto Post Bot"
        git add post_state.json
        git commit -m "🔄 Updated post type index"
        git push
      continue-on-error: true
