name: Auto Post to Facebook (Gemini 1.0)

on:
  schedule:
    - cron: "0 8,18 * * *"  # Twice a day UTC
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: 3.11

    - name: Install dependencies
      run: |
        pip install -r requirements.txt

    - name: Run posting script
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
        FB_PAGE_TOKENS: ${{ secrets.FB_PAGE_TOKENS }}
        FB_PAGE_IDS: ${{ secrets.FB_PAGE_IDS }}
      run: python post_to_facebook.py

    - name: Commit updated post type tracker
      run: |
        git config --global user.email "bot@github.com"
        git config --global user.name "Facebook Auto Bot"
        git add post_state.json
        git commit -m "🔄 Cycle post type"
        git push
      continue-on-error: true
