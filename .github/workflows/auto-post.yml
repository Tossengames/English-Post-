name: Auto Post to Facebook (English Learning Bot)

on:
  schedule:
    - cron: "0 8,18 * * *"  # Runs twice daily at 08:00 and 18:00 UTC
  workflow_dispatch:       # Also allows manual trigger

jobs:
  post:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: 3.11

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Auto Post Script
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
        FB_PAGE_TOKENS: ${{ secrets.FB_PAGE_TOKENS }}
        FB_PAGE_IDS: ${{ secrets.FB_PAGE_IDS }}
      run: python post_to_facebook.py

    - name: Commit Updated Post Type Index (post_state.json)
      run: |
        git config --global user.email "actions@github.com"
        git config --global user.name "GitHub Actions"
        git add post_state.json
        git commit -m "Update post state"
        git push
      continue-on-error: true  # Optional: avoids failure if file hasn't changed
