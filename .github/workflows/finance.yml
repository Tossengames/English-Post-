name: Post Tech Content
on:
  schedule:
    - cron: '0 12 * * *'  # Runs daily at 12 PM UTC
  workflow_dispatch:       # Allows manual triggering

jobs:
  post-tech-content:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: Install system dependencies for Arabic fonts
      run: |
        sudo apt-get update
        sudo apt-get install -y libraqm0 libfribidi0 libharfbuzz0b
        sudo apt-get install -y fonts-noto-core fonts-noto-cjk fonts-noto-extra
        # Install additional Arabic font support
        sudo apt-get install -y fonts-arabeyes fonts-arabic-shaped
        
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pillow requests google-generativeai googlesearch-python
        pip install google-genai || echo "New SDK not available, using old one"
        
    - name: Run tech content script
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        PIXABAY_KEY: ${{ secrets.PIXABAY_KEY }}
        FB_PAGE_TOKEN: ${{ secrets.FB_PAGE_TOKEN }}
        FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
      run: |
        python tech.py 