name: English  quiz 

on:
  schedule:
   # Middle East Times (UTC+3): 9 AM, 12 PM, 5 PM
    # Converted to UTC: 6 AM, 9 AM, 2 PM
  #  #- cron: '0 6 * * *'  # 9 AM EEST (6 AM UTC)
  #  #- cron: '0 9 * * *'  # 12 PM EEST (9 AM UTC)
  #  #- cron: '0 14 * * *' # 5 PM EEST (2 PM UTC)

  workflow_dispatch:       # Manual trigger

jobs:
  generate-and-post:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests Pillow google-generativeai
        pip install google-genai
    
    - name: Install fonts
      run: |
        sudo apt-get update
        sudo apt-get install -y fonts-dejavu
        sudo fc-cache -fv
    
    - name: Run generation and posting script
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        FB_PAGE_TOKEN: ${{ secrets.FB_PAGE_TOKEN }}
        FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
      run: |
        python english_quiz.py