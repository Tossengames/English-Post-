name: Random Daily Facebook Post

on:
  schedule:
    # Runs 6 times a day (at 00:00, 04:00, 08:00, 12:00, 16:00, 20:00 UTC)
    # Corresponding EEST times (UTC+3): 3 AM, 7 AM, 11 AM, 3 PM, 7 PM, 11 PM
    - cron: '0 0,4,8,12,16,20 * * *' 
  workflow_dispatch:
    # This allows manual triggering from the GitHub Actions tab.

jobs:
  post:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests google-generativeai

      - name: Run Random Post Script
        env:
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_PAGE_TOKEN: ${{ secrets.FB_PAGE_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python post_to_facebook.py
