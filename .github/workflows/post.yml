name: Automated Facebook Teacher Posts

on:
  schedule:
    # Run once daily at 12 PM Middle East time (UTC+3)
    # This translates to 9:00 UTC
   # - cron: '0 9 * * *'  # 12:00 PM EEST (9:00 UTC)

   # Middle East Times (UTC+3): 9 AM, 12 PM, 5 PM
    # Converted to UTC: 6 AM, 9 AM, 2 PM
  - cron: '0 6 * * *'  # 9 AM EEST (6 AM UTC)
  - cron: '0 9 * * *'  # 12 PM EEST (9 AM UTC)
  - cron: '0 14 * * *' # 5 PM EEST (2 PM UTC)



  workflow_dispatch:
    # This allows manual triggering from the GitHub Actions tab.

jobs:
  post:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests google-generativeai

      - name: Run Teacher Post Script
        env:
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_PAGE_TOKEN: ${{ secrets.FB_PAGE_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PIXABAY_KEY: ${{ secrets.PIXABAY_KEY }}
        run: python teacher_post.py