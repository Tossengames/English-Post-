name: Automated Facebook Teacher Posts this is used for main posts before moms

on:
  schedule:
    # Posts at 8AM, 12PM, 4PM, 8PM Middle East Time (UTC+3)
   # - cron: '0 14 * * *'
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests google-generativeai

      - name: Run Teacher Post Script
        env:
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_PAGE_TOKEN: ${{ secrets.FB_PAGE_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PIXABAY_KEY: ${{ secrets.PIXABAY_KEY }}
        run: python teacher_post.py