name: Daily Facebook Post

on:
  workflow_dispatch:
    inputs:
      specific_teacher_id:
        description: 'Enter teacher ID (1, 2, 3) for a single test post (leave blank for normal daily sequence)'
        required: false
        type: string
  schedule:
    # First post of the day: 8:00 AM EEST (5:00 UTC)
    - cron: '0 5 * * *'
    # Second post of the day: 1:00 PM EEST (10:00 UTC)
    - cron: '0 10 * * *'
    # Third post of the day: 6:00 PM EEST (15:00 UTC)
    - cron: '0 15 * * *'

jobs:
  post:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Download existing state files (if any)
        uses: actions/download-artifact@v4 # <-- CHANGED FROM v3 TO v4
        with:
          name: workflow-state
          path: .

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          pip install requests
          pip install google-generativeai

      - name: Run Teacher Post Script
        env:
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_PAGE_TOKEN: ${{ secrets.FB_PAGE_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python teacher_post.py ${{ github.event.inputs.specific_teacher_id }}

      - name: Upload updated state files
        uses: actions/upload-artifact@v4 # <-- CHANGED FROM v3 TO v4
        with:
          name: workflow-state
          path: |
            post_state.json
            post_log.json
          retention-days: 1
