name: Daily Facebook Post

on:
  workflow_dispatch: # This makes the "Run workflow" button appear
    inputs:
      specific_teacher_id:
        description: 'Enter teacher ID (1, 2, 3) for a single test post (leaves blank for normal sequence)'
        required: false
        type: string
  schedule:
    # First post of the day: 8:00 AM EEST (5:00 UTC)
    - cron: '0 5 * * *'
    # Second post of the day: 1:00 PM EEST (10:00 UTC)
    - cron: '0 10 * * *'
    # Third post of the day: 6:00 PM EEST (15:00 UTC)
    - cron: '0 15 * * *'

jobs:
  post: # This job will run for both manual triggers and scheduled runs
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          pip install requests
          pip install google-generativeai # <-- ADD THIS LINE

      - name: Run Teacher Post Script
        env:
          FACEBOOK_APP_ID: ${{ secrets.FACEBOOK_APP_ID }}
          FACEBOOK_APP_SECRET: ${{ secrets.FACEBOOK_APP_SECRET }}
          FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
          FACEBOOK_ACCESS_TOKEN: ${{ secrets.FACEBOOK_ACCESS_TOKEN }}
        run: python teacher_post.py ${{ github.event.inputs.specific_teacher_id }}
