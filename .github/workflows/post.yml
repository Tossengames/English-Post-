name: Automated Facebook Posting

on:
  schedule:
    # Schedule for Morning (Teacher) post at 6:00 AM UTC (9:00 AM EEST)
    - cron: '0 6 * * *'
    # Schedule for Midday (Random) post at 10:00 AM UTC (1:00 PM EEST)
    - cron: '0 10 * * *'
    # Schedule for Evening (Teacher) post at 3:00 PM UTC (6:00 PM EEST)
    - cron: '0 15 * * *'
  
  workflow_dispatch:
    inputs:
      post_type:
        description: 'Choose post type'
        required: true
        type: choice
        options:
          - random
          - teacher
          - debug # For testing without actual posting (useful for development)
      specific_teacher_id:
        description: 'Optional: Specify teacher ID (e.g., "nada") for manual "teacher" post. Leave blank for rotation.'
        required: false
        type: string

jobs:
  run_daily_post:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9' # Or your preferred Python version

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Post Script (Scheduled or Manual)
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        FB_PAGE_TOKEN: ${{ secrets.FB_PAGE_TOKEN }}
        FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
        MANUAL_POST_TYPE: ${{ github.event.inputs.post_type }}
        # Pass the specific_teacher_id as an environment variable
        SPECIFIC_TEACHER_ID: ${{ github.event.inputs.specific_teacher_id }}
      run: python post_to_facebook.py

