name: Daily Facebook Post

on:
  workflow_dispatch: # This enables the "Run workflow" button on GitHub Actions
    inputs:
      specific_teacher_id:
        description: 'Enter teacher ID (1, 2, 3) for a single test post (leaves blank for normal daily sequence)'
        required: false
        type: string
      manual_post_slot: # NEW INPUT: Use this to control the post type manually (0, 1, or 2)
        description: 'Manual post slot: 0 for 1st Teacher, 1 for Random, 2 for 2nd Teacher'
        required: false # This input is optional
        type: string # Expecting a number as a string

  schedule:
    # First post of the day: 8:00 AM EEST (5:00 UTC)
    - cron: '0 5 * * *'
    # Second post of the day: 1:00 PM EEST (10:00 UTC)
    - cron: '0 10 * * *'
    # Third post of the day: 6:00 PM EEST (15:00 UTC)
    - cron: '0 15 * * *'

jobs:
  post:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          pip install requests
          pip install google-generativeai

      - name: Run Teacher Post Script
        env:
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_PAGE_TOKEN: ${{ secrets.FB_PAGE_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          # Pass both specific_teacher_id and manual_post_slot as arguments.
          # Your Python script MUST be updated to accept and use these arguments.
          python teacher_post.py \
            "${{ github.event.inputs.specific_teacher_id }}" \
            "${{ github.event.inputs.manual_post_slot }}"
