# .github/workflows/daily_facebook_post.yml (Modified)
name: Daily Facebook Post

on:
  workflow_dispatch: # This enables the "Run workflow" button on GitHub Actions
    inputs:
      specific_teacher_id:
        description: 'Enter teacher ID (1, 2, 3) for a single test post (leaves blank for normal daily sequence)'
        required: false
        type: string
      
      manual_run_slot: # Renamed and simplified
        description: 'Manual Post Slot (0-5 for specific type/teacher, or leave blank for schedule)'
        required: false # This input is optional
        type: choice
        options:
          - 'None' # Default for scheduled sequence
          - '0' # Teacher 1 / Exam slot
          - '1' # Random Post slot
          - '2' # Teacher 2 slot
          - '3' # Random Post slot
          - '4' # Teacher 3 slot
          - '5' # Random Post slot
        default: 'None'

  schedule:
    # Schedule for 6 posts a day (EEST to UTC conversion)
    # Slot 0 (Teacher 1 / Exam): 8:00 AM EEST -> 5:00 AM UTC
    - cron: '0 5 * * *'
    # Slot 1 (Random):    10:00 AM EEST -> 7:00 AM UTC
    - cron: '0 7 * * *'
    # Slot 2 (Teacher 2): 12:00 PM EEST -> 9:00 AM UTC
    - cron: '0 9 * * *'
    # Slot 3 (Random):    2:00 PM EEST -> 11:00 AM UTC
    - cron: '0 11 * * *'
    # Slot 4 (Teacher 3): 4:00 PM EEST -> 1:00 PM UTC (13:00 UTC)
    - cron: '0 13 * * *'
    # Slot 5 (Random):    6:00 PM EEST -> 3:00 PM UTC (15:00 UTC)
    - cron: '0 15 * * *'

jobs:
  post:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          pip install requests
          pip install google-generativeai

      - name: Run Main Posting Script
        env:
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_PAGE_TOKEN: ${{ secrets.FB_PAGE_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # Pass manual inputs as environment variables to post_to_facebook.py
          SPECIFIC_TEACHER_ID: ${{ github.event.inputs.specific_teacher_id }}
          MANUAL_RUN_SLOT: ${{ github.event.inputs.manual_run_slot }}
        run: |
          python post_to_facebook.py # This is now the main entry point
