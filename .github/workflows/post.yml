name: Daily Facebook Post

on:
  workflow_dispatch:
    inputs:
      specific_teacher_id:
        description: 'Enter teacher ID (1, 2, 3) for a single test post (leaves other fields blank)'
        required: false
        type: string
      run_full_day_cycle:
        description: 'Set to true to run all 3 daily posts (Teacher -> Random -> Teacher) consecutively for testing'
        required: false
        type: boolean
        default: false
  schedule:
    # First post: 8:00 AM EEST (5:00 UTC)
    - cron: '0 5 * * *'
    # Second post: 1:00 PM EEST (10:00 UTC)
    - cron: '0 15 * * *'
    # Third post: 6:00 PM EEST (15:00 UTC)
    - cron: '0 20 * * *' # Changed to 20 UTC for 11 PM EEST, giving more spread. Adjust if needed.

jobs:
  # --- Job for the regular scheduled posts or single teacher test posts ---
  post_single:
    if: github.event.inputs.run_full_day_cycle == 'false' || github.event.inputs.run_full_day_cycle == '' # Only run if not full cycle
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          pip install requests

      - name: Run Teacher Post Script
        env:
          FACEBOOK_APP_ID: ${{ secrets.FACEBOOK_APP_ID }}
          FACEBOOK_APP_SECRET: ${{ secrets.FACEBOOK_APP_SECRET }}
          FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
          FACEBOOK_ACCESS_TOKEN: ${{ secrets.FACEBOOK_ACCESS_TOKEN }}
        run: python teacher_post.py ${{ github.event.inputs.specific_teacher_id }}

  # --- New Job for running the full 3-post daily cycle in one go ---
  post_full_day_cycle:
    if: github.event.inputs.run_full_day_cycle == 'true' # Only run if full cycle requested
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          pip install requests
      
      # Clear post_slot_of_day to ensure it starts from 0 for the full cycle
      - name: Reset post_slot_of_day for full cycle test
        run: |
          python -c "import json; \
          try: \
              with open('post_state.json', 'r+') as f: \
                  data = json.load(f); \
                  data['post_slot_of_day'] = 0; \
                  f.seek(0); \
                  json.dump(data, f, indent=2); \
                  f.truncate(); \
          except FileNotFoundError: \
              print('post_state.json not found, creating with post_slot_of_day = 0'); \
              with open('post_state.json', 'w') as f: \
                  json.dump({'post_slot_of_day': 0}, f, indent=2)"
          
      - name: Run 1st Post (Teacher)
        env:
          FACEBOOK_APP_ID: ${{ secrets.FACEBOOK_APP_ID }}
          FACEBOOK_APP_SECRET: ${{ secrets.FACEBOOK_APP_SECRET }}
          FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
          FACEBOOK_ACCESS_TOKEN: ${{ secrets.FACEBOOK_ACCESS_TOKEN }}
        run: python teacher_post.py

      - name: Run 2nd Post (Random)
        env:
          FACEBOOK_APP_ID: ${{ secrets.FACEBOOK_APP_ID }}
          FACEBOOK_APP_SECRET: ${{ secrets.FACEBOOK_APP_SECRET }}
          FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
          FACEBOOK_ACCESS_TOKEN: ${{ secrets.FACEBOOK_ACCESS_TOKEN }}
        run: python teacher_post.py

      - name: Run 3rd Post (Teacher)
        env:
          FACEBOOK_APP_ID: ${{ secrets.FACEBOOK_APP_ID }}
          FACEBOOK_APP_SECRET: ${{ secrets.FACEBOOK_APP_SECRET }}
          FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
          FACEBOOK_ACCESS_TOKEN: ${{ secrets.FACEBOOK_ACCESS_TOKEN }}
        run: python teacher_post.py
