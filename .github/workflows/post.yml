name: Automated Facebook Teacher Posts

on:
  schedule:
    # Runs 4 times a day at 5:00 AM, 11:00 AM, 5:00 PM, 11:00 PM UTC
    # Corresponding EEST times (UTC+3): 8 AM, 2 PM, 8 PM, 2 AM (next day)
    - cron: '0 5,11,17,23 * * *' 
  workflow_dispatch:
    # This allows manual triggering from the GitHub Actions tab.

jobs:
  post:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests google-generativeai

      - name: Run Teacher Post Script
        env:
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_PAGE_TOKEN: ${{ secrets.FB_PAGE_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PIXABAY_KEY: ${{ secrets.PIXABAY_KEY }} # Make sure this secret is added!
        run: python teacher_post.py

