name: Daily Facebook Post

on:
  workflow_dispatch: # This enables the "Run workflow" button on GitHub Actions
    inputs:
      specific_teacher_id:
        description: 'Enter teacher ID (1, 2, 3) for a single test post (leaves blank for normal daily sequence)'
        required: false
        type: string
      
      # NEW: Use 'choice' type for a dropdown
      post_type_selection: 
        description: 'Select Post Type for Manual Run'
        required: false # This input is optional
        type: choice
        options:
          - '0: 1st Teacher Post'
          - '1: Random Post'
          - '2: 2nd Teacher Post'
          - 'None (Scheduled Sequence)' # Option for letting scheduled logic decide
        default: 'None (Scheduled Sequence)' # Default selection

  schedule:
    # First post of the day: 8:00 AM EEST (5:00 UTC)
    - cron: '0 5 * * *'
    # Second post of the day: 1:00 PM EEST (10:00 UTC)
    - cron: '0 10 * * *'
    # Third post of the day: 6:00 PM EEST (15:00 UTC)
    - cron: '0 15 * * *'

jobs:
  post:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          pip install requests
          pip install google-generativeai

      - name: Run Teacher Post Script
        env:
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_PAGE_TOKEN: ${{ secrets.FB_PAGE_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          # Extract the numerical slot from the dropdown selection (e.g., '0: 1st Teacher Post' -> '0')
          # If 'None (Scheduled Sequence)' is selected, this will pass an empty string or 'None'
          SELECTED_POST_SLOT=$(echo "${{ github.event.inputs.post_type_selection }}" | cut -d':' -f1 | xargs)
          
          python teacher_post.py \
            "${{ github.event.inputs.specific_teacher_id }}" \
            "$SELECTED_POST_SLOT" # Pass the extracted slot or 'None'
