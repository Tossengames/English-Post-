name: Daily Facebook Post

on:
  workflow_dispatch:
    inputs:
      specific_teacher_id:
        description: 'Enter teacher ID (1, 2, 3) for a single test post (leave blank for normal daily sequence)'
        required: false
        type: string
  schedule:
    # First post of the day: 8:00 AM EEST (5:00 UTC)
    - cron: '0 5 * * *'
    # Second post of the day: 1:00 PM EEST (10:00 UTC)
    - cron: '0 10 * * *'
    # Third post of the day: 6:00 PM EEST (15:00 UTC)
    - cron: '0 15 * * *'

jobs:
  post:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          pip install requests
          pip install google-generativeai

      - name: Run Teacher Post Script
        env:
          # These are your EXACT secret names, used directly as environment variable names for your script:
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }} # Using your specified secret name
          FB_PAGE_TOKEN: ${{ secrets.FB_PAGE_TOKEN }} # Using your specified secret name
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }} # Assuming this name is correct
        run: python teacher_post.py ${{ github.event.inputs.specific_teacher_id }}
