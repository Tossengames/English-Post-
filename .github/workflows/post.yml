name: Automated Facebook Posting

on:
  schedule:
    # Schedule for Morning (Teacher) post at 6:00 AM UTC (9:00 AM EEST)
    - cron: '0 6 * * *'
    # Schedule for Midday (Random) post at 10:00 AM UTC (1:00 PM EEST)
    - cron: '0 10 * * *'
    # Schedule for Evening (Teacher) post at 3:00 PM UTC (6:00 PM EEST)
    - cron: '0 15 * * *'
  
  workflow_dispatch:
    inputs:
      post_type:
        description: 'Choose post type'
        required: true
        type: choice
        options:
          - random
          - teacher
          - debug # For testing without actual posting (optional)

jobs:
  run_daily_post:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9' # Or your preferred Python version

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt # Create this file with your Python dependencies

    - name: Run Post Script (Scheduled)
      if: github.event_name == 'schedule'
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        FB_PAGE_TOKEN: ${{ secrets.FB_PAGE_TOKEN }} # <--- Changed here
        FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }} # If you don't want to hardcode in common.py
      run: python post_to_facebook.py

    - name: Run Post Script (Manual Dispatch)
      if: github.event_name == 'workflow_dispatch'
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        FB_PAGE_TOKEN: ${{ secrets.FB_PAGE_TOKEN }} # <--- Changed here
        FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }} # If you don't want to hardcode in common.py
        MANUAL_POST_TYPE: ${{ github.event.inputs.post_type }}
      run: python post_to_facebook.py
