name: Daily Facebook Post

on:
  workflow_dispatch:
    inputs:
      specific_teacher_id:
        description: 'Enter teacher ID (1, 2, 3) for a single test post (leave blank for normal daily sequence)'
        required: false
        type: string
  schedule:
    - cron: '0 5 * * *'
    - cron: '0 10 * * *'
    - cron: '0 15 * * *'

jobs:
  post:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          pip install requests
          pip install google-generativeai

      - name: Run Teacher Post Script
        env:
          # Using your specified secret names:
          FACEBOOK_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FACEBOOK_ACCESS_TOKEN: ${{ secrets.FB_PAGE_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python teacher_post.py ${{ github.event.inputs.specific_teacher_id }}
