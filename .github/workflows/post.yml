name: Automated Facebook Teacher Posts

on:
  schedule:
    # Optimized for Middle East (UTC+3)
    # 8 AM, 12 PM, 5 PM, 9 PM EEST (peak engagement times)
    - cron: '0 5,9,14,18 * * *'  # UTC times: 5:00, 9:00, 14:00, 18:00
  workflow_dispatch:
    # This allows manual triggering from the GitHub Actions tab.

jobs:
  post:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests google-generativeai

      - name: Run Teacher Post Script
        env:
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_PAGE_TOKEN: ${{ secrets.FB_PAGE_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PIXABAY_KEY: ${{ secrets.PIXABAY_KEY }}
        run: python teacher_post.py