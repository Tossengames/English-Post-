name: Auto English Posts

on:
  schedule:
    - cron: '30 7 * * *'   # Teacher post - 10:30 AM Cairo
    - cron: '0 13 * * *'   # Random post - 3:00 PM Cairo
    - cron: '0 17 * * *'   # Teacher again - 7:00 PM Cairo
  workflow_dispatch:
    inputs:
      post_type:
        description: 'Choose post type'
        required: true
        default: 'random'
        type: choice
        options:
          - teacher
          - random

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: python -m pip install --upgrade pip

      - name: Run selected script
        run: |
          if [ "${{ github.event.inputs.post_type }}" = "teacher" ]; then
            python teacher_post.py
          else
            python post_random.py
          fi
        env:
          FB_PAGE_TOKEN: ${{ secrets.FB_PAGE_TOKEN }}
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
