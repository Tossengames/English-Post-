name: Auto Post to Facebook

on:
  schedule:
    - cron: '0 6 * * *'   # 9 AM ME Time
    - cron: '0 11 * * *'  # 2 PM ME Time
    - cron: '0 15 * * *'  # 6 PM ME Time
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests python-docx PyMuPDF

      - name: Post (Morning)
        if: github.event.schedule == '0 6 * * *'
        run: python post_to_facebook.py 0
        env:
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_PAGE_TOKEN: ${{ secrets.FB_PAGE_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Post (Midday)
        if: github.event.schedule == '0 11 * * *'
        run: python post_to_facebook.py 1
        env:
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_PAGE_TOKEN: ${{ secrets.FB_PAGE_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Post (Evening & rotate teacher)
        if: github.event.schedule == '0 15 * * *'
        run: python post_to_facebook.py 2
        env:
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_PAGE_TOKEN: ${{ secrets.FB_PAGE_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
