name: Daily Facebook Post

on:
  workflow_dispatch: # Allows you to manually trigger the workflow from GitHub
  schedule:
    # First post: 8:00 AM EEST (5:00 UTC)
    - cron: '0 5 * * *'
    # Second post: 1:00 PM EEST (10:00 UTC)
    - cron: '0 10 * * *'
    # Third post: 6:00 PM EEST (15:00 UTC)
    - cron: '0 15 * * *'

jobs:
  post:
    runs-on: ubuntu-latest # The operating system to run the job on
    environment: production # Specifies a production environment (optional, but good practice for secrets)

    steps:
      - name: Checkout code
        uses: actions/checkout@v3 # Checks out your repository code

      - name: Set up Python
        uses: actions/setup-python@v4 # Sets up Python on the runner
        with:
          python-version: '3.x' # Use the latest Python 3 version

      - name: Install dependencies
        run: |
          pip install requests # Installs the 'requests' library for Facebook API calls

      - name: Run Teacher Post Script
        # These environment variables pass your Facebook API credentials securely to the script
        env:
          FACEBOOK_APP_ID: ${{ secrets.FACEBOOK_APP_ID }}
          FACEBOOK_APP_SECRET: ${{ secrets.FACEBOOK_APP_SECRET }}
          FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
          FACEBOOK_ACCESS_TOKEN: ${{ secrets.FACEBOOK_ACCESS_TOKEN }}
        run: python teacher_post.py # Executes your main script
