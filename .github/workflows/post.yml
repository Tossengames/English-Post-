name: Daily Facebook Post

on:
  workflow_dispatch:
    inputs:
      specific_teacher_id:
        description: 'Enter teacher ID (1, 2, 3) for a single test post (leaves blank for normal daily sequence)'
        required: false
        type: string
      
      manual_run_slot:
        description: 'Manual Post Slot (0-5 for specific type/teacher, or leave blank for schedule)'
        required: false
        type: choice
        options:
          - 'None'
          - '0'
          - '1'
          - '2'
          - '3'
          - '4'
          - '5'
        default: 'None'

  schedule:
    # TEMPORARY: Runs every 2 minutes for testing purposes
    # IMPORTANT: Revert this after testing!
    - cron: '*/2 * * * *' # This means "at every 2nd minute" (e.g., :00, :02, :04, etc.)

jobs:
  post:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          pip install requests
          pip install google-generativeai

      - name: Run Main Posting Script
        env:
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_PAGE_TOKEN: ${{ secrets.FB_PAGE_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SPECIFIC_TEACHER_ID: ${{ github.event.inputs.specific_teacher_id }}
          MANUAL_RUN_SLOT: ${{ github.event.inputs.manual_run_slot }}
        run: |
          python post_to_facebook.py
