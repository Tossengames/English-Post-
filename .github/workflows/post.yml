name: Auto Post English Content

on:
  workflow_dispatch:
    inputs:
      post_type:
        description: "Choose post type"
        required: true
        default: "random"
        type: choice
        options:
          - random
          - teacher

jobs:
  autopost:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run selected post script
        run: |
          if [ "${{ github.event.inputs.post_type }}" = "teacher" ]; then
            python teacher_post.py
          else
            python post_random.py
          fi
