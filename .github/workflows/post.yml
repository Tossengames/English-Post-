name: Random Daily Facebook Post

on:
  schedule:
    # Runs 6 times a day, starting at 5:00 AM UTC (8:00 AM EEST)
    # Corresponding EEST times (UTC+3): 8 AM, 12 PM, 4 PM, 8 PM, 12 AM, 4 AM
    - cron: '0 5,9,13,17,21,1 * * *' 
  workflow_dispatch:
    # This allows manual triggering from the GitHub Actions tab.

jobs:
  post:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests google-generativeai

      - name: Run Random Post Script
        env:
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_PAGE_TOKEN: ${{ secrets.FB_PAGE_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python post_to_facebook.py
