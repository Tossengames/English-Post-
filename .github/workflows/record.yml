name: still-moments-post

on:
  workflow_dispatch:
    inputs:
      caption:
        description: Post caption
        required: false
        default: A still moment to breathe. #StillMoments #Relaxation
  schedule:
    - cron: '0 9 * * *'

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:

      - name: checkout
        uses: actions/checkout@v4

      - name: node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: install
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg libnss3 libatk-bridge2.0-0 libdrm2 libxkbcommon0 libgbm1
          npm init -y
          npm install puppeteer

      - name: get-meta
        id: meta
        run: node get_meta.mjs

      - name: ffmpeg
        run: |
          URL="${{ steps.meta.outputs.VIDEO_URL }}"
          START="${{ steps.meta.outputs.START_TIME }}"
          DUR="${{ steps.meta.outputs.CLIP_DURATION }}"
          FETCH=$(echo "$DUR + 5" | bc)
          FADEOUT=$(echo "$DUR - 1.5" | bc)
          ffmpeg -y -ss "$START" -i "$URL" -t "$FETCH" -c copy source.mp4
          ffmpeg -y -i source.mp4 -filter_complex "[0:v]scale=1080:1920:force_original_aspect_ratio=increase,crop=1080:1920,boxblur=20:5,setsar=1[bg];[0:v]scale=1080:1920:force_original_aspect_ratio=decrease,pad=1080:1920:(ow-iw)/2:(oh-ih)/2:black@0,setsar=1[fg];[bg][fg]overlay=0:0[composed];[composed]drawtext=text='Still Moments':fontcolor=white@0.75:fontsize=42:x=w-tw-50:y=h-th-160:shadowcolor=black@0.5:shadowx=2:shadowy=2,fade=t=in:st=0:d=1,fade=t=out:st=${FADEOUT}:d=1.5[out]" -map "[out]" -map 0:a? -t "$DUR" -c:v libx264 -preset fast -crf 23 -c:a aac -b:a 128k -movflags +faststart -pix_fmt yuv420p final.mp4

      - name: post-fb
        env:
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_PAGE_TOKEN: ${{ secrets.FB_PAGE_TOKEN }}
          CAPTION: ${{ github.event.inputs.caption || 'A still moment to breathe. #StillMoments #Relaxation' }}
        run: node post.mjs