name: still-moments-post

"on":
  workflow_dispatch:
    inputs:
      caption:
        description: "Post caption"
        required: false
        default: "A still moment to breathe."
  schedule:
    - cron: "0 9 * * *"

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: install-deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg bc jq python3

      - name: find-video
        id: vid
        env:
          PIXABAY_KEY: "50973339-3e27fd59ddfd9c68378e78753"
        run: |
          set -e
          CLIP=10
          SKIP_HEAD=15
          SKIP_TAIL=10
          MIN_DUR=$((SKIP_HEAD + CLIP + SKIP_TAIL))
          VIDEO_URL=""
          TERMS="nature walk forest|rain village relaxing|peaceful river stream|mountain path walking|garden rain morning|forest path meditation|rainy street calm|lake reflection peaceful|sunset nature walk|waterfall nature calm"
          IFS='|' read -ra TERM_ARR <<< "$TERMS"
          for TERM in $(printf "%s\n" "${TERM_ARR[@]}" | shuf); do
            PAGE=$((RANDOM % 5 + 1))
            ENCODED=$(python3 -c "import urllib.parse,sys; print(urllib.parse.quote(sys.argv[1]))" "$TERM")
            URL="https://pixabay.com/api/videos/?key=${PIXABAY_KEY}&q=${ENCODED}&video_type=film&per_page=20&page=${PAGE}"
            RESP=$(curl -sf --max-time 15 "$URL" 2>/dev/null) || continue
            COUNT=$(echo "$RESP" | jq -r '.hits | length' 2>/dev/null) || continue
            [ "$COUNT" -eq 0 ] && continue
            for i in $(seq 0 $((COUNT - 1)) | shuf); do
              DUR=$(echo "$RESP" | jq -r ".hits[$i].duration" 2>/dev/null)
              [[ "$DUR" =~ ^[0-9]+$ ]] || continue
              [ "$DUR" -lt "$MIN_DUR" ] && continue
              VURL=$(echo "$RESP" | jq -r ".hits[$i].videos.large.url // .hits[$i].videos.medium.url // .hits[$i].videos.small.url" 2>/dev/null)
              [ -z "$VURL" ] || [ "$VURL" = "null" ] && continue
              ZONE_END=$((DUR - SKIP_TAIL - CLIP))
              RANGE=$((ZONE_END - SKIP_HEAD))
              [ "$RANGE" -le 0 ] && continue
              START=$((SKIP_HEAD + RANDOM % RANGE))
              VIDEO_URL="$VURL"
              echo "video_url=$VIDEO_URL" >> "$GITHUB_OUTPUT"
              echo "start=$START" >> "$GITHUB_OUTPUT"
              echo "clip=$CLIP" >> "$GITHUB_OUTPUT"
              echo "Found video: start=${START}s clip=${CLIP}s dur=${DUR}s"
              break 2
            done
          done
          if [ -z "$VIDEO_URL" ]; then
            echo "No valid video found"
            exit 1
          fi

      - name: find-music
        id: music
        env:
          PIXABAY_KEY: "50973339-3e27fd59ddfd9c68378e78753"
        run: |
          MUSIC_URL=""
          MUSIC_DUR=0
          TERMS="ambient|relaxing|meditation|peaceful|calm|piano|zen|nature"
          IFS='|' read -ra TERM_ARR <<< "$TERMS"
          for TERM in $(printf "%s\n" "${TERM_ARR[@]}" | shuf); do
            ENCODED=$(python3 -c "import urllib.parse,sys; print(urllib.parse.quote(sys.argv[1]))" "$TERM")
            PAGE=$((RANDOM % 3 + 1))
            RESP=$(curl -sf --max-time 15 "https://pixabay.com/api/?key=${PIXABAY_KEY}&q=${ENCODED}&media_type=music&per_page=20&page=${PAGE}" 2>/dev/null) || continue
            COUNT=$(echo "$RESP" | jq -r '.hits | length' 2>/dev/null) || continue
            [ "$COUNT" -eq 0 ] && continue
            for mi in $(seq 0 $((COUNT - 1)) | shuf); do
              MDUR=$(echo "$RESP" | jq -r ".hits[$mi].duration" 2>/dev/null)
              [[ "$MDUR" =~ ^[0-9]+$ ]] || continue
              [ "$MDUR" -lt 30 ] && continue
              MURL=$(echo "$RESP" | jq -r ".hits[$mi].audio_download_url // .hits[$mi].audio_url // .hits[$mi].download_url // .hits[$mi].previewURL // empty" 2>/dev/null)
              [ -z "$MURL" ] || [ "$MURL" = "null" ] && continue
              MUSIC_URL="$MURL"
              MUSIC_DUR="$MDUR"
              echo "music_url=$MUSIC_URL" >> "$GITHUB_OUTPUT"
              echo "music_dur=$MUSIC_DUR" >> "$GITHUB_OUTPUT"
              echo "Found music: dur=${MDUR}s"
              break 2
            done
          done
          if [ -z "$MUSIC_URL" ]; then
            echo "No music found"
            echo "music_url=NONE" >> "$GITHUB_OUTPUT"
            echo "music_dur=0" >> "$GITHUB_OUTPUT"
          fi

      - name: process-video
        run: |
          URL="${{ steps.vid.outputs.video_url }}"
          START="${{ steps.vid.outputs.start }}"
          DUR="${{ steps.vid.outputs.clip }}"
          MUSIC_URL="${{ steps.music.outputs.music_url }}"
          MUSIC_DUR="${{ steps.music.outputs.music_dur }}"
          FETCH=$(echo "$DUR + 5" | bc)
          FADEOUT=$(echo "$DUR - 1.5" | bc)

          ffmpeg -hide_banner -loglevel error -y -ss "$START" -i "$URL" -t "$FETCH" -c copy source.mp4

          HAS_VIDEO_AUDIO=$(ffprobe -v error -select_streams a:0 -show_entries stream=codec_type -of csv=p=0 source.mp4 2>/dev/null || echo "")
          echo "Video native audio: ${HAS_VIDEO_AUDIO:-none}"

          GOT_MUSIC=0
          if [ "$MUSIC_URL" != "NONE" ] && [ -n "$MUSIC_URL" ]; then
            curl -sf --max-time 60 -L "$MUSIC_URL" -o music_full.mp3 && GOT_MUSIC=1 || echo "Music download failed"
          fi

          if [ "$GOT_MUSIC" -eq 1 ]; then
            MZONE_END=$((MUSIC_DUR - 10 - DUR))
            [ "$MZONE_END" -le 10 ] && MZONE_END=10
            MRANGE=$((MZONE_END - 10))
            [ "$MRANGE" -le 0 ] && MRANGE=1
            MSTART=$((10 + RANDOM % MRANGE))
            ffmpeg -hide_banner -loglevel error -y -ss "$MSTART" -i music_full.mp3 -t "$FETCH" music_clip.mp3
            if [ -n "$HAS_VIDEO_AUDIO" ]; then
              ffmpeg -hide_banner -loglevel error -y -i source.mp4 -i music_clip.mp3 -filter_complex "[0:v]scale=1080:1920:force_original_aspect_ratio=increase,crop=1080:1920,boxblur=20:5,setsar=1[bg];[0:v]scale=1080:1920:force_original_aspect_ratio=decrease,pad=1080:1920:(ow-iw)/2:(oh-ih)/2:black@0,setsar=1[fg];[bg][fg]overlay=0:0[composed];[composed]drawtext=text='Still Moments':fontcolor=white@0.75:fontsize=42:x=w-tw-50:y=h-th-160:shadowcolor=black@0.5:shadowx=2:shadowy=2,fade=t=in:st=0:d=1,fade=t=out:st=${FADEOUT}:d=1.5[out];[0:a]volume=1.0[va];[1:a]volume=0.25,afade=t=in:st=0:d=1,afade=t=out:st=${FADEOUT}:d=1.5[ma];[va][ma]amix=inputs=2:duration=first[aout]" -map "[out]" -map "[aout]" -t "$DUR" -c:v libx264 -preset fast -crf 23 -c:a aac -b:a 128k -movflags +faststart -pix_fmt yuv420p final.mp4
            else
              ffmpeg -hide_banner -loglevel error -y -i source.mp4 -i music_clip.mp3 -filter_complex "[0:v]scale=1080:1920:force_original_aspect_ratio=increase,crop=1080:1920,boxblur=20:5,setsar=1[bg];[0:v]scale=1080:1920:force_original_aspect_ratio=decrease,pad=1080:1920:(ow-iw)/2:(oh-ih)/2:black@0,setsar=1[fg];[bg][fg]overlay=0:0[composed];[composed]drawtext=text='Still Moments':fontcolor=white@0.75:fontsize=42:x=w-tw-50:y=h-th-160:shadowcolor=black@0.5:shadowx=2:shadowy=2,fade=t=in:st=0:d=1,fade=t=out:st=${FADEOUT}:d=1.5[out];[1:a]volume=1.0,afade=t=in:st=0:d=1,afade=t=out:st=${FADEOUT}:d=1.5[aout]" -map "[out]" -map "[aout]" -t "$DUR" -c:v libx264 -preset fast -crf 23 -c:a aac -b:a 128k -movflags +faststart -pix_fmt yuv420p final.mp4
            fi
          else
            echo "No music — using 432hz tone..."
            ffmpeg -hide_banner -loglevel error -y -i source.mp4 -f lavfi -i "sine=frequency=432:sample_rate=44100" -filter_complex "[0:v]scale=1080:1920:force_original_aspect_ratio=increase,crop=1080:1920,boxblur=20:5,setsar=1[bg];[0:v]scale=1080:1920:force_original_aspect_ratio=decrease,pad=1080:1920:(ow-iw)/2:(oh-ih)/2:black@0,setsar=1[fg];[bg][fg]overlay=0:0[composed];[composed]drawtext=text='Still Moments':fontcolor=white@0.75:fontsize=42:x=w-tw-50:y=h-th-160:shadowcolor=black@0.5:shadowx=2:shadowy=2,fade=t=in:st=0:d=1,fade=t=out:st=${FADEOUT}:d=1.5[out];[1:a]volume=0.15,afade=t=in:st=0:d=2,afade=t=out:st=${FADEOUT}:d=1.5[aout]" -map "[out]" -map "[aout]" -t "$DUR" -c:v libx264 -preset fast -crf 23 -c:a aac -b:a 128k -movflags +faststart -pix_fmt yuv420p final.mp4
          fi

          ls -lh final.mp4
          ffprobe -v error -select_streams a:0 -show_entries stream=codec_name,bit_rate -of csv=p=0 final.mp4 && echo "Audio OK" || echo "WARNING: no audio"

      - name: post-to-facebook
        env:
          PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          PAGE_TOKEN: ${{ secrets.FB_PAGE_TOKEN }}
          CAPTION: ${{ github.event.inputs.caption || 'A still moment to breathe.' }}
        run: |
          set -e
          FILE="final.mp4"
          SIZE=$(stat -c%s "$FILE")
          API="https://graph.facebook.com/v19.0"
          INIT=$(curl -sf -X POST "${API}/${PAGE_ID}/video_reels" -H "Content-Type: application/json" -d "{\"upload_phase\":\"start\",\"access_token\":\"${PAGE_TOKEN}\"}")
          SESSION=$(echo "$INIT" | jq -r '.upload_session_id')
          VID_ID=$(echo "$INIT" | jq -r '.video_id')
          if [ "$SESSION" = "null" ] || [ -z "$SESSION" ]; then
            echo "Reels failed — trying videos endpoint..."
            INIT=$(curl -sf -X POST "${API}/${PAGE_ID}/videos" -H "Content-Type: application/json" -d "{\"upload_phase\":\"start\",\"file_size\":${SIZE},\"access_token\":\"${PAGE_TOKEN}\"}")
            SESSION=$(echo "$INIT" | jq -r '.upload_session_id')
            VID_ID=$(echo "$INIT" | jq -r '.video_id')
            S_OFF=$(echo "$INIT" | jq -r '.start_offset')
            if [ "$SESSION" = "null" ] || [ -z "$SESSION" ]; then
              echo "Both endpoints failed: $INIT"
              exit 1
            fi
            curl -sf -X POST "${API}/${PAGE_ID}/videos" -F "upload_phase=transfer" -F "upload_session_id=${SESSION}" -F "start_offset=${S_OFF}" -F "video_file_chunk=@${FILE};type=video/mp4" -F "access_token=${PAGE_TOKEN}" > /dev/null
            FINISH=$(curl -sf -X POST "${API}/${PAGE_ID}/videos" -H "Content-Type: application/json" -d "{\"upload_phase\":\"finish\",\"upload_session_id\":\"${SESSION}\",\"description\":\"${CAPTION}\",\"published\":true,\"access_token\":\"${PAGE_TOKEN}\"}")
          else
            UPLOAD_URL=$(echo "$INIT" | jq -r '.upload_url')
            curl -sf -X POST "$UPLOAD_URL" -H "Authorization: OAuth ${PAGE_TOKEN}" -H "offset: 0" -H "file_size: ${SIZE}" --data-binary "@${FILE}" > /dev/null
            FINISH=$(curl -sf -X POST "${API}/${PAGE_ID}/video_reels" -H "Content-Type: application/json" -d "{\"upload_phase\":\"finish\",\"video_id\":\"${VID_ID}\",\"description\":\"${CAPTION}\",\"published\":true,\"access_token\":\"${PAGE_TOKEN}\"}")
          fi
          echo "Result: $FINISH"
          OK=$(echo "$FINISH" | jq -r '.success // .id // empty')
          if [ -z "$OK" ]; then
            echo "Publish failed: $FINISH"
            exit 1
          fi
          echo "Posted! Video ID: $VID_ID"