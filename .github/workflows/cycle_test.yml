name: Random Daily Post

on:
  schedule:
    # This example runs every day at 8 AM EEST (5 AM UTC)
    # Adjust as needed for your desired frequency
    - cron: '0 5 * * *' 
  workflow_dispatch:
    # Allows manual triggering from the GitHub Actions tab

jobs:
  run_random_post:
    runs-on: ubuntu-latest
    timeout-minutes: 5 # Set a timeout to prevent long runs if something hangs

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13' # Or '3.x' for broader compatibility

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Random Post Script
        run: python post_to_facebook.py
        env:
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_PAGE_TOKEN: ${{ secrets.FB_PAGE_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # No other specific environment variables are needed now
