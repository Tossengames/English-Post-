name: Random Daily Facebook Post

on:
  schedule:
    # This schedule runs daily at 5:00 AM UTC (which is 8:00 AM EEST in Egypt)
    - cron: '0 5 * * *' 
  workflow_dispatch:
    # This allows manual triggering from the GitHub Actions tab.
    # No specific inputs are needed, as the script now decides randomly.

jobs:
  post:
    runs-on: ubuntu-latest
    environment: production # Make sure this matches your environment name if you use one

    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # Use the latest action version

      - name: Set up Python
        uses: actions/setup-python@v5 # Use the latest action version
        with:
          python-version: '3.x' # Or '3.13' for a specific version

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests google-generativeai

      - name: Run Random Post Script
        env:
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_PAGE_TOKEN: ${{ secrets.FB_PAGE_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # No other environment variables are needed for specific post types or teachers
        run: python post_to_facebook.py
