name: 🌋 Post Lava Lamp to Facebook

on:
  workflow_dispatch:
    inputs:
      duration:
        description: "Duration in seconds"
        required: false
        default: "10"
  schedule:
    #- cron: "0 10 * * *"

jobs:
  record:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y xvfb chromium-browser libnss3 libgbm1 libasound2 ffmpeg pulseaudio

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install Python deps
        run: pip install selenium webdriver-manager requests

      - name: Start virtual display and audio
        run: |
          Xvfb :99 -screen 0 390x844x24 -ac &
          pulseaudio --start --exit-idle-time=-1 &
          echo "DISPLAY=:99" >> $GITHUB_ENV
          sleep 3

      - name: Record and Post to Facebook
        run: |
          python3 << 'PYEOF'
          import os, time, subprocess, random, requests, glob, base64
          from selenium import webdriver
          from selenium.webdriver.chrome.options import Options
          from selenium.webdriver.chrome.service import Service
          from webdriver_manager.chrome import ChromeDriverManager

          duration   = int(os.environ.get("DURATION", "10"))
          ts         = time.strftime("%Y%m%d_%H%M%S")
          webm_file  = f"/tmp/lavalamp_{ts}.webm"
          mp4_file   = f"/tmp/lavalamp_{ts}.mp4"
          mix_file   = f"/tmp/lavalamp_{ts}_mixed.mp4"
          html_path  = os.path.abspath("lavalamp.html")
          fb_token   = os.environ.get("FB_PAGE_TOKEN")
          fb_page_id = os.environ.get("FB_PAGE_ID")

          music_files = []
          for ext in ["mp3","m4a","wav","ogg"]:
            music_files.extend(glob.glob(f"bgmusic/*.{ext}"))
          music_track = random.choice(music_files) if music_files else None

          opts = Options()
          opts.add_argument("--headless=new")
          opts.add_argument("--no-sandbox")
          opts.add_argument("--disable-dev-shm-usage")
          opts.add_argument("--disable-gpu")
          opts.add_argument("--window-size=390,844")
          
          # ANTI-THROTTLING FLAGS
          opts.add_argument("--disable-background-timer-throttling")
          opts.add_argument("--disable-backgrounding-occluded-windows")
          opts.add_argument("--disable-renderer-backgrounding")
          opts.add_argument("--disable-features=CalculateNativeWinOcclusion")
          opts.add_argument("--autoplay-policy=no-user-gesture-required")

          print("Starting Chrome...")
          driver = webdriver.Chrome(service=Service(ChromeDriverManager().install()), options=opts)
          driver.set_window_size(390, 844)

          print(f"Loading file://{html_path}")
          driver.get(f"file://{html_path}")
          time.sleep(5)

          print("Recording started...")
          driver.execute_script(f"window.startRecording(30);")
          time.sleep(duration)

          print("Stopping recording...")
          driver.execute_script("window.stopRecording();")
          
          # Increased wait time for file finalization
          time.sleep(5)

          print("Extracting video...")
          b64 = driver.execute_async_script("""
            var done = arguments[0];
            window.getRecordingBase64().then(done).catch(e => done(null));
          """)

          driver.quit()

          if not b64:
            raise RuntimeError("Recording failed or returned no data.")

          with open(webm_file, 'wb') as f:
            f.write(base64.b64decode(b64))

          print("Converting and mixing...")
          subprocess.run([
            "ffmpeg", "-y", "-i", webm_file,
            "-c:v", "libx264", "-preset", "veryfast", "-crf", "18",
            "-pix_fmt", "yuv420p", "-vf", "scale=390:844", mp4_file
          ], check=True)

          final_file = mp4_file
          if music_track:
            subprocess.run([
              "ffmpeg", "-y", "-i", mp4_file, "-stream_loop", "-1", "-i", music_track,
              "-filter_complex", "[0:a]volume=1.0[sfx];[1:a]volume=0.3[music];[sfx][music]amix=inputs=2:duration=first",
              "-c:v", "copy", "-c:a", "aac", "-shortest", mix_file
            ], check=True)
            final_file = mix_file

          # Post to FB
          caption = "🌋 Lava lamp vibes #Satisfying #Relaxing #LavaLamp"
          with open(final_file, 'rb') as f:
            r = requests.post(
              f"https://graph-video.facebook.com/v18.0/{fb_page_id}/videos",
              data={"description": caption, "access_token": fb_token},
              files={"source": (os.path.basename(final_file), f, "video/mp4")}
            )
          print(f"Facebook response: {r.text}")
          print("Done!")
          PYEOF
        env:
          FB_PAGE_TOKEN: ${{ secrets.FB_PAGE_TOKEN }}
          FB_PAGE_ID:    ${{ secrets.FB_PAGE_ID }}
