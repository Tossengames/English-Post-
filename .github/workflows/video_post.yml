name: English Word Practice Video

on:
  schedule:
    # Middle East Times (UTC+3): 9 AM, 12 PM, 5 PM
    # Converted to UTC: 6 AM, 9 AM, 2 PM
    - cron: '0 6 * * *'  # 9 AM EEST (6 AM UTC)
    - cron: '0 9 * * *'  # 12 PM EEST (9 AM UTC)
    - cron: '0 14 * * *' # 5 PM EEST (2 PM UTC)
  workflow_dispatch:

jobs:
  create-video:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install FFmpeg
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg

    - name: Install Python dependencies
      run: |
        pip install google-generativeai edge-tts requests

    - name: Run English Video Creator
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
        FB_PAGE_TOKEN: ${{ secrets.FB_PAGE_TOKEN }}
        PIXABAY_KEY: ${{ secrets.PIXABAY_KEY }}
      run: |
        python beautiful_english_video.py

    - name: Upload generated video
      uses: actions/upload-artifact@v4
      with:
        name: english-video
        path: |
          beautiful_english_video.mp4
          video_description.txt
        if-no-files-found: ignore