name: Animal Image Auto Poster

permissions:
  contents: write   # required to push JSON history back to repo

on:
  schedule:
    - cron: "0 8,20 * * *"   # runs twice a day (UTC)
  workflow_dispatch:        # manual run button

jobs:
  post-animals:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pillow

      - name: 🐾 Run animal posting script
        env:
          PIXABAY_KEY: ${{ secrets.PIXABAY_KEY }}
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_PAGE_TOKEN: ${{ secrets.FB_PAGE_TOKEN }}
        run: |
          python animal1.py

      - name: 💾 Commit posted image history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add posted_animals.json

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update posted animal images history"
            git push
          fi