name: 🎨 Post Paint Fill (art4) to Facebook

on:
  workflow_dispatch:
    inputs:
      duration:
        description: "Duration in seconds"
        required: false
        default: "15"
  schedule:
    - cron: "0 10 * * *"

jobs:
  record:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache apt
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: apt-ubuntu22-art4-v1

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            xvfb chromium-browser libnss3 libgbm1 libasound2 ffmpeg pulseaudio

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install Python deps
        run: pip install selenium webdriver-manager requests

      - name: Set timestamp
        run: echo "TS=$(date +%Y%m%d_%H%M%S)" >> $GITHUB_ENV

      - name: Start virtual display and audio
        run: |
          Xvfb :99 -screen 0 390x844x24 -ac &
          pulseaudio --start --exit-idle-time=-1 &
          echo "DISPLAY=:99" >> $GITHUB_ENV
          sleep 3

      - name: Record and Post to Facebook
        run: |
          python3 << 'PYEOF'
          import os, time, subprocess, random, requests, glob, base64
          from selenium import webdriver
          from selenium.webdriver.chrome.options import Options
          from selenium.webdriver.chrome.service import Service
          from webdriver_manager.chrome import ChromeDriverManager

          duration   = int(os.environ.get("DURATION", "15"))
          ts         = os.environ.get("TS", "test")
          webm_file  = f"/tmp/art4_{ts}.webm"
          mp4_file   = f"/tmp/art4_{ts}.mp4"
          mix_file   = f"/tmp/art4_{ts}_mixed.mp4"
          html_path  = os.path.abspath("art4.html")
          fb_token   = os.environ.get("FB_PAGE_TOKEN")
          fb_page_id = os.environ.get("FB_PAGE_ID")

          music_files = []
          for ext in ["mp3","m4a","wav","ogg","flac","wv","MP3","M4A","WAV"]:
            music_files.extend(glob.glob(f"bgmusic/*.{ext}"))
          music_track = random.choice(music_files) if music_files else None

          opts = Options()
          opts.add_argument("--no-sandbox")
          opts.add_argument("--disable-dev-shm-usage")
          opts.add_argument("--window-size=390,844")
          opts.add_argument("--autoplay-policy=no-user-gesture-required")
          opts.add_argument("--use-fake-ui-for-media-stream")

          driver = webdriver.Chrome(service=Service(ChromeDriverManager().install()), options=opts)
          driver.set_window_size(390, 844)

          print(f"Loading file://{html_path}")
          driver.get(f"file://{html_path}")
          time.sleep(3)

          # SYNC START: Resume Audio -> Start Recorder -> Start Paint
          print("Synchronizing Start...")
          driver.execute_script("if(typeof AC !== 'undefined') AC.resume();")
          driver.execute_script("window.startRecording(30);")
          time.sleep(1) # Buffer to ensure recorder is ready
          driver.execute_script("window.beginPainting();")
          
          print(f"Recording for {duration}s...")
          time.sleep(duration)

          driver.execute_script("window.stopRecording();")
          
          for _ in range(30):
            if driver.execute_script("return window._recordingDone;"):
              break
            time.sleep(0.5)
          else:
            driver.execute_script("window.forceFinalize();")

          b64 = driver.execute_async_script("var done=arguments[0]; window.getRecordingBase64().then(done);")
          driver.quit()

          with open(webm_file, 'wb') as f:
            f.write(base64.b64decode(b64))

          # Convert and post logic remains the same...
          subprocess.run([
            "ffmpeg", "-y", "-i", webm_file,
            "-c:v", "libx264", "-preset", "slow", "-crf", "18",
            "-pix_fmt", "yuv420p", "-vf", "scale=390:844",
            "-c:a", "aac", "-b:a", "192k", mp4_file
          ])

          final_file = mp4_file
          if music_track:
            subprocess.run([
              "ffmpeg", "-y", "-i", mp4_file, "-stream_loop", "-1", "-i", music_track,
              "-filter_complex", "[0:a]volume=1.0[sfx];[1:a]volume=0.3[music];[sfx][music]amix=inputs=2:duration=first[aout]",
              "-map", "0:v", "-map", "[aout]", "-c:v", "copy", "-c:a", "aac", "-shortest", mix_file
            ])
            final_file = mix_file

          # Facebook Post
          with open(final_file, 'rb') as f:
            requests.post(f"https://graph-video.facebook.com/v18.0/{fb_page_id}/videos",
              data={"description": "🎨 #Art #Satisfying", "access_token": fb_token},
              files={"source": (os.path.basename(final_file), f, "video/mp4")})
          
          print("Done!")
          PYEOF
        env:
          DURATION:      ${{ github.event.inputs.duration || '15' }}
          TS:            ${{ env.TS }}
          FB_PAGE_TOKEN: ${{ secrets.FB_PAGE_TOKEN }}
          FB_PAGE_ID:    ${{ secrets.FB_PAGE_ID }}
