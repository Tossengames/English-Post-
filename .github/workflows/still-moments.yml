name: still-moments-post

on:
  workflow_dispatch:
    inputs:
      caption:
        description: 'Post caption'
        required: false
        default: 'A still moment to breathe. #StillMoments #Relaxation'
  schedule:
    - cron: '0 7 * * *'

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg jq curl python3

      - name: Fetch Video
        id: video
        run: |
          set -e
          
          # HARDCODED KEY AS REQUESTED
          PIXABAY_KEY="50973339-3e27fd59ddfd9c68378e78753"
          
          CLIP_LEN=10
          HEAD_MARGIN=15
          TAIL_MARGIN=10
          REQUIRED_DUR=$((HEAD_MARGIN + CLIP_LEN + TAIL_MARGIN))
          
          # Search for nature videos
          QUERY="peaceful nature forest"
          ENCODED_QUERY=$(python3 -c "import urllib.parse; print(urllib.parse.quote('$QUERY'))")
          
          API_URL="https://pixabay.com/api/videos/?key=${PIXABAY_KEY}&q=${ENCODED_QUERY}&per_page=10&video_type=film"
          
          # Get the full JSON response
          RESPONSE=$(curl -s "$API_URL")
          
          # Parse the first hit that meets the duration requirement
          # We use jq to find the first index where duration > REQUIRED_DUR
          INDEX=$(echo "$RESPONSE" | jq -r ".hits | to_entries | .[] | select(.value.duration >= $REQUIRED_DUR) | .key" | head -n 1)
          
          if [ -z "$INDEX" ]; then
            echo "Error: No video found with duration > ${REQUIRED_DUR}s"
            exit 1
          fi

          # Extract data for that specific index
          VIDEO_URL=$(echo "$RESPONSE" | jq -r ".hits[$INDEX].videos.medium.url")
          TOTAL_DUR=$(echo "$RESPONSE" | jq -r ".hits[$INDEX].duration")
          
          # Calculate a safe random start point
          # Start must be at least 15s in, and end at least 10s before the finish
          MAX_START=$((TOTAL_DUR - TAIL_MARGIN - CLIP_LEN))
          RANGE=$((MAX_START - HEAD_MARGIN))
          RANDOM_START=$((HEAD_MARGIN + RANDOM % (RANGE + 1)))

          echo "Selected Video URL: $VIDEO_URL"
          echo "Start Time: $RANDOM_START"

          # CRITICAL: Export to GITHUB_OUTPUT so the next step can see these
          echo "url=$VIDEO_URL" >> $GITHUB_OUTPUT
          echo "start=$RANDOM_START" >> $GITHUB_OUTPUT
          echo "clip=$CLIP_LEN" >> $GITHUB_OUTPUT

      - name: Process Video
        run: |
          set -e
          
          # Pull values from the previous step's output
          INPUT_URL="${{ steps.video.outputs.url }}"
          SEEK_START="${{ steps.video.outputs.start }}"
          CLIP_DURATION="${{ steps.video.outputs.clip }}"

          # Download the file
          curl -L "$INPUT_URL" -o raw_video.mp4

          # Run FFmpeg:
          # 1. -ss AFTER -i is more reliable for web streams to avoid black frames
          # 2. Scale and crop for 9:16 Vertical Reel format
          # 3. Add 'Still Moments' text overlay
          ffmpeg -y -i raw_video.mp4 -ss "$SEEK_START" -t "$CLIP_DURATION" \
            -vf "scale=1080:1920:force_original_aspect_ratio=increase,crop=1080:1920,drawtext=text='Still Moments':fontcolor=white@0.7:fontsize=64:x=(w-tw)/2:y=h-th-300" \
            -c:v libx264 -preset fast -crf 23 -pix_fmt yuv420p \
            -c:a aac -b:a 128k \
            final_output.mp4

          ls -lh final_output.mp4

      - name: Post to Facebook
        env:
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_PAGE_TOKEN: ${{ secrets.FB_PAGE_TOKEN }}
          CAPTION: ${{ github.event.inputs.caption || 'A still moment to breathe. #StillMoments #Relaxation' }}
        run: |
          set -e
          echo "Sending to Facebook Page..."
          
          # Single-step video upload to Facebook Graph API
          curl -X POST "https://graph.facebook.com/v19.0/${FB_PAGE_ID}/videos" \
            -F "access_token=${FB_PAGE_TOKEN}" \
            -F "source=@final_output.mp4" \
            -F "description=${CAPTION}"
