name: still-moments-post 1

"on":
  workflow_dispatch:
    inputs:
      caption:
        description: "Post caption (leave empty for random)"
        required: false
        default: ""
  schedule:
    - cron: "0 9 * * *"

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: install-deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg bc jq python3

      - name: checkout
        uses: actions/checkout@v4

      - name: find-video
        id: vid
        env:
          PIXABAY_KEY: "50973339-3e27fd59ddfd9c68378e78753"
        run: |
          set -e
          CLIP=15
          SKIP_HEAD=15
          SKIP_TAIL=10
          MIN_DUR=$((SKIP_HEAD + CLIP + SKIP_TAIL))
          VIDEO_URL=""
          TERMS="nature walk forest|rain village relaxing|peaceful river stream|mountain path walking|garden rain morning|forest path meditation|rainy street calm|lake reflection peaceful|sunset nature walk|waterfall nature calm"
          IFS='|' read -ra TERM_ARR <<< "$TERMS"
          for TERM in $(printf "%s\n" "${TERM_ARR[@]}" | shuf); do
            PAGE=$((RANDOM % 5 + 1))
            ENCODED=$(python3 -c "import urllib.parse,sys; print(urllib.parse.quote(sys.argv[1]))" "$TERM")
            URL="https://pixabay.com/api/videos/?key=${PIXABAY_KEY}&q=${ENCODED}&video_type=film&per_page=20&page=${PAGE}"
            RESP=$(curl -sf --max-time 15 "$URL" 2>/dev/null) || continue
            COUNT=$(echo "$RESP" | jq -r '.hits | length' 2>/dev/null) || continue
            [ "$COUNT" -eq 0 ] && continue
            for i in $(seq 0 $((COUNT - 1)) | shuf); do
              DUR=$(echo "$RESP" | jq -r ".hits[$i].duration" 2>/dev/null)
              [[ "$DUR" =~ ^[0-9]+$ ]] || continue
              [ "$DUR" -lt "$MIN_DUR" ] && continue
              VURL=$(echo "$RESP" | jq -r ".hits[$i].videos.large.url // .hits[$i].videos.medium.url // .hits[$i].videos.small.url" 2>/dev/null)
              [ -z "$VURL" ] || [ "$VURL" = "null" ] && continue
              ZONE_END=$((DUR - SKIP_TAIL - CLIP))
              RANGE=$((ZONE_END - SKIP_HEAD))
              [ "$RANGE" -le 0 ] && continue
              START=$((SKIP_HEAD + RANDOM % RANGE))
              VIDEO_URL="$VURL"
              echo "video_url=$VIDEO_URL" >> "$GITHUB_OUTPUT"
              echo "start=$START" >> "$GITHUB_OUTPUT"
              echo "clip=$CLIP" >> "$GITHUB_OUTPUT"
              echo "Found video: start=${START}s clip=${CLIP}s dur=${DUR}s"
              break 2
            done
          done
          if [ -z "$VIDEO_URL" ]; then
            echo "No valid video found"
            exit 1
          fi

      - name: pick-music
        id: music
        run: |
          TRACKS=(bgmusic/*.mp3 bgmusic/*.wav)
          VALID=()
          for t in "${TRACKS[@]}"; do
            [ -f "$t" ] && VALID+=("$t")
          done
          if [ ${#VALID[@]} -eq 0 ]; then
            echo "No music files found in bgmusic folder"
            exit 1
          fi
          IDX=$((RANDOM % ${#VALID[@]}))
          PICKED="${VALID[$IDX]}"
          echo "music_file=$PICKED" >> "$GITHUB_OUTPUT"
          echo "Selected: $PICKED"

      - name: pick-caption
        id: caption
        run: |
          INPUT_CAPTION="${{ github.event.inputs.caption }}"
          if [ -n "$INPUT_CAPTION" ]; then
            echo "caption=$INPUT_CAPTION" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          CAPTIONS=(
            "Close your eyes. Let it pass. 🌿 #StillMoments #Relaxation #Calm #MindfulLiving #NatureVibes"
            "Breathe in. Breathe out. Nothing else matters right now. 🍃 #StillMoments #Peaceful #NatureWalk #Mindfulness #Chill"
            "Some moments are meant to be felt, not rushed. 🌊 #StillMoments #SlowDown #NatureLovers #Tranquil #Relax"
            "Let the world slow down with you. 🌸 #StillMoments #Calm #NatureHeals #PeacefulMind #Breathe"
            "This is your reminder to just be. 🌲 #StillMoments #BePresent #NatureTherapy #Mindful #QuietMoment"
            "Peace is not a place. It is a moment like this. 🌅 #StillMoments #InnerPeace #NatureVibes #Serenity #Zen"
            "Stillness is not emptiness. It is everything. 🍂 #StillMoments #Stillness #ForestBathing #NatureWalk #Peaceful"
            "You do not need to go anywhere. Just stay here for a moment. 🌧 #StillMoments #RainyDay #Cozy #NatureSound #SlowLife"
            "The forest does not hurry, yet everything is accomplished. 🌳 #StillMoments #ForestWalk #NatureQuotes #Mindfulness #Grounded"
            "Let nature do what therapy cannot. 🏞 #StillMoments #HealingNature #WalkInNature #Tranquility #MindBody"
            "Find your quiet. Find yourself. 🌙 #StillMoments #QuietTime #EveningVibes #NatureLovers #SoulFood"
            "Not all those who wander are lost. Some are just breathing. 🌾 #StillMoments #Wander #NatureWalk #FreeSoul #Mindful"
            "Rain washes everything clean, including the mind. 🌧 #StillMoments #RainVibes #NatureSounds #Peaceful #Reset"
            "A walk in nature is a walk back to yourself. 🛤 #StillMoments #NatureWalk #FindYourself #OutdoorLife #Calm"
            "Slow down. The best things in life are not rushed. 🌺 #StillMoments #SlowLiving #NatureHeals #Breathe #Present"
          )
          IDX=$((RANDOM % ${#CAPTIONS[@]}))
          PICKED="${CAPTIONS[$IDX]}"
          echo "caption=$PICKED" >> "$GITHUB_OUTPUT"
          echo "Picked: $PICKED"

      - name: process-video
        run: |
          URL="${{ steps.vid.outputs.video_url }}"
          START="${{ steps.vid.outputs.start }}"
          DUR="${{ steps.vid.outputs.clip }}"
          MUSIC_FILE="${{ steps.music.outputs.music_file }}"
          FETCH=$(echo "$DUR + 5" | bc)
          FADEOUT=$(echo "$DUR - 1.5" | bc)

          echo "Downloading video segment..."
          ffmpeg -hide_banner -loglevel error -y -ss "$START" -i "$URL" -t "$FETCH" -c copy source.mp4

          HAS_VIDEO_AUDIO=$(ffprobe -v error -select_streams a:0 -show_entries stream=codec_type -of csv=p=0 source.mp4 2>/dev/null || echo "")
          echo "Video native audio: ${HAS_VIDEO_AUDIO:-none}"
          echo "Using music: $MUSIC_FILE"

          # Get music duration and pick random start
          MDUR=$(ffprobe -v error -show_entries format=duration -of csv=p=0 "$MUSIC_FILE" 2>/dev/null | cut -d. -f1)
          MMAX=$((MDUR - 5))
          [ "$MMAX" -le 5 ] && MMAX=5
          MSTART=$((RANDOM % MMAX))
          echo "Music start: ${MSTART}s of ${MDUR}s total"

          # Loop music infinitely then cut to exact fetch duration — guarantees full coverage
          ffmpeg -hide_banner -loglevel error -y \
            -stream_loop -1 -ss "$MSTART" -i "$MUSIC_FILE" \
            -t "$FETCH" \
            music_clip.mp3

          VFILTER="[0:v]scale=1080:1920:force_original_aspect_ratio=increase,crop=1080:1920,boxblur=20:5,setsar=1[bg];[0:v]scale=1080:1920:force_original_aspect_ratio=decrease,pad=1080:1920:(ow-iw)/2:(oh-ih)/2:black@0,setsar=1[fg];[bg][fg]overlay=0:0[composed];[composed]drawtext=text='Still Moments':fontcolor=white@0.75:fontsize=42:x=w-tw-50:y=h-th-160:shadowcolor=black@0.5:shadowx=2:shadowy=2,fade=t=in:st=0:d=1,fade=t=out:st=${FADEOUT}:d=1.5[vout]"

          if [ -n "$HAS_VIDEO_AUDIO" ]; then
            echo "Mixing video audio + music..."
            ffmpeg -hide_banner -loglevel error -y \
              -i source.mp4 -i music_clip.mp3 \
              -filter_complex "${VFILTER};[0:a]volume=1.0[va];[1:a]volume=0.3,afade=t=in:st=0:d=1,afade=t=out:st=${FADEOUT}:d=1.5[ma];[va][ma]amix=inputs=2:duration=first[aout]" \
              -map "[vout]" -map "[aout]" \
              -t "$DUR" -c:v libx264 -preset fast -crf 23 -c:a aac -b:a 128k -movflags +faststart -pix_fmt yuv420p final.mp4
          else
            echo "Music only..."
            ffmpeg -hide_banner -loglevel error -y \
              -i source.mp4 -i music_clip.mp3 \
              -filter_complex "${VFILTER};[1:a]volume=1.0,afade=t=in:st=0:d=1,afade=t=out:st=${FADEOUT}:d=1.5[aout]" \
              -map "[vout]" -map "[aout]" \
              -t "$DUR" -c:v libx264 -preset fast -crf 23 -c:a aac -b:a 128k -movflags +faststart -pix_fmt yuv420p final.mp4
          fi

          ls -lh final.mp4
          ffprobe -v error -select_streams a:0 -show_entries stream=codec_name -of csv=p=0 final.mp4

      - name: post-to-facebook
        env:
          PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          PAGE_TOKEN: ${{ secrets.FB_PAGE_TOKEN }}
          CAPTION: ${{ steps.caption.outputs.caption }}
        run: |
          set -e
          FILE="final.mp4"
          SIZE=$(stat -c%s "$FILE")
          API="https://graph.facebook.com/v19.0"
          INIT=$(curl -sf -X POST "${API}/${PAGE_ID}/video_reels" -H "Content-Type: application/json" -d "{\"upload_phase\":\"start\",\"access_token\":\"${PAGE_TOKEN}\"}")
          SESSION=$(echo "$INIT" | jq -r '.upload_session_id')
          VID_ID=$(echo "$INIT" | jq -r '.video_id')
          if [ "$SESSION" = "null" ] || [ -z "$SESSION" ]; then
            echo "Reels failed — trying videos endpoint..."
            INIT=$(curl -sf -X POST "${API}/${PAGE_ID}/videos" -H "Content-Type: application/json" -d "{\"upload_phase\":\"start\",\"file_size\":${SIZE},\"access_token\":\"${PAGE_TOKEN}\"}")
            SESSION=$(echo "$INIT" | jq -r '.upload_session_id')
            VID_ID=$(echo "$INIT" | jq -r '.video_id')
            S_OFF=$(echo "$INIT" | jq -r '.start_offset')
            if [ "$SESSION" = "null" ] || [ -z "$SESSION" ]; then
              echo "Both endpoints failed: $INIT"
              exit 1
            fi
            curl -sf -X POST "${API}/${PAGE_ID}/videos" -F "upload_phase=transfer" -F "upload_session_id=${SESSION}" -F "start_offset=${S_OFF}" -F "video_file_chunk=@${FILE};type=video/mp4" -F "access_token=${PAGE_TOKEN}" > /dev/null
            FINISH=$(curl -sf -X POST "${API}/${PAGE_ID}/videos" -H "Content-Type: application/json" -d "{\"upload_phase\":\"finish\",\"upload_session_id\":\"${SESSION}\",\"description\":\"${CAPTION}\",\"published\":true,\"access_token\":\"${PAGE_TOKEN}\"}")
          else
            UPLOAD_URL=$(echo "$INIT" | jq -r '.upload_url')
            curl -sf -X POST "$UPLOAD_URL" -H "Authorization: OAuth ${PAGE_TOKEN}" -H "offset: 0" -H "file_size: ${SIZE}" --data-binary "@${FILE}" > /dev/null
            FINISH=$(curl -sf -X POST "${API}/${PAGE_ID}/video_reels" -H "Content-Type: application/json" -d "{\"upload_phase\":\"finish\",\"video_id\":\"${VID_ID}\",\"description\":\"${CAPTION}\",\"published\":true,\"access_token\":\"${PAGE_TOKEN}\"}")
          fi
          echo "Result: $FINISH"
          OK=$(echo "$FINISH" | jq -r '.success // .id // empty')
          if [ -z "$OK" ]; then
            echo "Publish failed: $FINISH"
            exit 1
          fi
          echo "Posted! Video ID: $VID_ID"