name: still-moments-post

on:
  workflow_dispatch:
    inputs:
      caption:
        description: 'Post caption'
        required: false
        default: 'A still moment to breathe. #StillMoments #Relaxation'
  schedule:
    - cron: '0 7 * * *'

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg jq curl python3

      - name: Fetch Video
        id: video
        run: |
          set -e
          
          # --- YOUR PIXABAY KEY ---
          PIXABAY_KEY="50973339-3e27fd59ddfd9c68378e78753"
          
          CLIP=10
          SKIP_HEAD=15
          SKIP_TAIL=10
          MIN_DUR=$((SKIP_HEAD + CLIP + SKIP_TAIL))
          
          TERMS=("peaceful nature walk" "rainy forest" "calm river")
          TERM=${TERMS[$RANDOM % ${#TERMS[@]}]}
          
          ENCODED=$(python3 -c "import urllib.parse; print(urllib.parse.quote('$TERM'))")
          API="https://pixabay.com/api/videos/?key=${PIXABAY_KEY}&q=${ENCODED}&per_page=5&video_type=film"
          
          RESPONSE=$(curl -s "$API")
          
          # Extract URL and Duration
          URL=$(echo "$RESPONSE" | jq -r ".hits[0].videos.medium.url")
          DUR=$(echo "$RESPONSE" | jq -r ".hits[0].duration")
          
          if [ "$URL" == "null" ] || [ -z "$URL" ]; then 
            echo "Error: Pixabay returned no video. Check your key or query."
            exit 1
          fi

          # Random start time logic
          START=$((SKIP_HEAD + RANDOM % (DUR - MIN_DUR + 1)))

          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "start=$START" >> $GITHUB_OUTPUT
          echo "clip=$CLIP" >> $GITHUB_OUTPUT

      - name: Process Video
        run: |
          set -e
          URL="${{ steps.video.outputs.url }}"
          START="${{ steps.video.outputs.start }}"
          DUR="${{ steps.video.outputs.clip }}"

          curl -L "$URL" -o input.mp4

          # Vertical Scale (1080x1920) for Reels/Stories
          ffmpeg -y -i input.mp4 -ss "$START" -t "$DUR" \
            -vf "scale=1080:1920:force_original_aspect_ratio=increase,crop=1080:1920,drawtext=text='Still Moments':fontcolor=white@0.6:fontsize=60:x=(w-tw)/2:y=h-th-250" \
            -c:v libx264 -preset fast -crf 23 -pix_fmt yuv420p \
            output.mp4

      - name: Post to Facebook
        env:
          # YOU STILL NEED THESE TWO IN GITHUB SECRETS FOR SECURITY
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_PAGE_TOKEN: ${{ secrets.FB_PAGE_TOKEN }}
          CAPTION: ${{ github.event.inputs.caption || 'A still moment to breathe. #StillMoments #Relaxation' }}
        run: |
          set -e
          echo "Uploading to Facebook..."
          curl -X POST "https://graph.facebook.com/v19.0/${FB_PAGE_ID}/videos" \
            -F "access_token=${FB_PAGE_TOKEN}" \
            -F "source=@output.mp4" \
            -F "description=${CAPTION}"
