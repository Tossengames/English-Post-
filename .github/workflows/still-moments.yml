name: still-moments-post

on:
  workflow_dispatch:
  schedule:
    - cron: '0 9 * * *'

jobs:
  post:
    runs-on: ubuntu-latest

    steps:
      - name: install
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg jq curl

      - name: get-video
        id: vid
        env:
          KEY: 50973339-3e27fd59ddfd9c68378e78753
        run: |
          set -e

          QUERY="nature relaxing"
          API="https://pixabay.com/api/videos/?key=$KEY&q=$QUERY&per_page=10"

          RES=$(curl -s "$API")
          URL=$(echo "$RES" | jq -r '.hits[0].videos.medium.url')
          DUR=$(echo "$RES" | jq -r '.hits[0].duration')

          if [ -z "$URL" ] || [ "$URL" = "null" ]; then
            echo "No video"
            exit 1
          fi

          START=5
          CLIP=10

          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "start=$START" >> $GITHUB_OUTPUT
          echo "clip=$CLIP" >> $GITHUB_OUTPUT

      - name: process
        run: |
          set -e

          URL="${{ steps.vid.outputs.url }}"
          START="${{ steps.vid.outputs.start }}"
          DUR="${{ steps.vid.outputs.clip }}"

          curl -L "$URL" -o input.mp4

          ffmpeg -y -ss "$START" -i input.mp4 -t "$DUR" \
            -vf "scale=1080:1920:force_original_aspect_ratio=increase,crop=1080:1920" \
            -c:v libx264 -preset fast -crf 23 \
            -pix_fmt yuv420p \
            out.mp4

          ls -lh out.mp4

      - name: debug-file
        run: |
          if [ ! -f out.mp4 ]; then
            echo "NO VIDEO CREATED"
            exit 1
          fi

      - name: post-facebook
        env:
          PAGE: ${{ secrets.FB_PAGE_ID }}
          TOKEN: ${{ secrets.FB_PAGE_TOKEN }}
        run: |
          set -e

          curl -X POST "https://graph.facebook.com/v19.0/$PAGE/videos" \
            -F "access_token=$TOKEN" \
            -F "source=@out.mp4" \
            -F "description=Still moment 🌿"