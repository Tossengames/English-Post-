      - name: fetch-video
        id: video
        env:
          PIXABAY_KEY: ${{ secrets.PIXABAY_KEY }}
        run: |
          set -e
          CLIP=10
          SKIP_HEAD=15
          SKIP_TAIL=10
          MIN_DUR=$((SKIP_HEAD + CLIP + SKIP_TAIL))

          # ... (your TERMS array and loop logic here) ...

          if [ -z "$FINAL_URL" ]; then
            echo "No valid video found"
            exit 1
          fi

          # Correct way to set outputs for the next step
          echo "url=${FINAL_URL}" >> $GITHUB_OUTPUT
          echo "start=${START_TIME}" >> $GITHUB_OUTPUT
          echo "clip=${CLIP}" >> $GITHUB_OUTPUT

      - name: process-video
        run: |
          set -e
          # Reference the outputs correctly
          URL="${{ steps.video.outputs.url }}"
          START="${{ steps.video.outputs.start }}"
          DUR="${{ steps.video.outputs.clip }}"

          curl -L "$URL" -o input.mp4

          # Added -b:v and -maxrate to ensure Facebook accepts the upload size
          ffmpeg -y -i input.mp4 -ss "$START" -t "$DUR" \
            -vf "scale=1080:1920:force_original_aspect_ratio=increase,crop=1080:1920,drawtext=text='Still Moments':fontcolor=white@0.7:fontsize=48:x=(w-tw)/2:y=h-th-200" \
            -c:v libx264 -preset fast -crf 23 -b:v 2M -maxrate 2M -bufsize 4M \
            -pix_fmt yuv420p \
            output.mp4

      - name: post-facebook
        env:
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_PAGE_TOKEN: ${{ secrets.FB_PAGE_TOKEN }}
          # Handles both manual trigger and scheduled run captions
          CAPTION: ${{ github.event.inputs.caption || 'A still moment to breathe. #StillMoments #Relaxation' }}
        run: |
          # Use -v for verbose output to debug FB errors if they happen
          curl -v -X POST "https://graph.facebook.com/v19.0/${FB_PAGE_ID}/videos" \
            -F "access_token=${FB_PAGE_TOKEN}" \
            -F "source=@output.mp4" \
            -F "description=${CAPTION}"
