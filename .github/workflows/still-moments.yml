name: still-moments-post

"on":
  workflow_dispatch:
    inputs:
      caption:
        description: "Post caption"
        required: false
        default: "A still moment to breathe."
  schedule:
    - cron: "0 9 * * *"

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: install-deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg bc jq python3

      - name: find-video
        id: vid
        env:
          PIXABAY_KEY: "50973339-3e27fd59ddfd9c68378e78753"
        run: |
          set -e
          CLIP=10
          SKIP_HEAD=15
          SKIP_TAIL=10
          MIN_DUR=$((SKIP_HEAD + CLIP + SKIP_TAIL))
          VIDEO_URL=""

          TERMS="nature walk forest|rain village relaxing|peaceful river stream|mountain path walking|garden rain morning|forest path meditation|rainy street calm|lake reflection peaceful|sunset nature walk|waterfall nature calm"

          IFS='|' read -ra TERM_ARR <<< "$TERMS"

          for TERM in $(printf "%s\n" "${TERM_ARR[@]}" | shuf); do
            PAGE=$((RANDOM % 5 + 1))
            ENCODED=$(python3 -c "import urllib.parse,sys; print(urllib.parse.quote(sys.argv[1]))" "$TERM")
            URL="https://pixabay.com/api/videos/?key=${PIXABAY_KEY}&q=${ENCODED}&video_type=film&per_page=20&page=${PAGE}"
            RESP=$(curl -sf --max-time 15 "$URL" 2>/dev/null) || continue
            COUNT=$(echo "$RESP" | jq -r '.hits | length' 2>/dev/null) || continue
            [ "$COUNT" -eq 0 ] && continue

            for i in $(seq 0 $((COUNT - 1)) | shuf); do
              DUR=$(echo "$RESP" | jq -r ".hits[$i].duration" 2>/dev/null)
              [[ "$DUR" =~ ^[0-9]+$ ]] || continue
              [ "$DUR" -lt "$MIN_DUR" ] && continue

              VURL=$(echo "$RESP" | jq -r ".hits[$i].videos.large.url // .hits[$i].videos.medium.url // .hits[$i].videos.small.url" 2>/dev/null)
              [ -z "$VURL" ] || [ "$VURL" = "null" ] && continue

              ZONE_END=$((DUR - SKIP_TAIL - CLIP))
              RANGE=$((ZONE_END - SKIP_HEAD))
              [ "$RANGE" -le 0 ] && continue
              START=$((SKIP_HEAD + RANDOM % RANGE))

              VIDEO_URL="$VURL"
              echo "video_url=$VIDEO_URL" >> "$GITHUB_OUTPUT"
              echo "start=$START" >> "$GITHUB_OUTPUT"
              echo "clip=$CLIP" >> "$GITHUB_OUTPUT"
              echo "Found video. Start=${START}s Clip=${CLIP}s"
              break 2
            done
          done

          if [ -z "$VIDEO_URL" ]; then
            echo "ERROR: No valid video found"
            exit 1
          fi

      - name: process-video
        run: |
          URL="${{ steps.vid.outputs.video_url }}"
          START="${{ steps.vid.outputs.start }}"
          DUR="${{ steps.vid.outputs.clip }}"
          FETCH=$(echo "$DUR + 5" | bc)
          FADEOUT=$(echo "$DUR - 1.5" | bc)

          ffmpeg -hide_banner -loglevel error \
            -y -ss "$START" -i "$URL" -t "$FETCH" -c copy source.mp4

          ffmpeg -hide_banner -loglevel error \
            -y -i source.mp4 \
            -filter_complex \
              "[0:v]scale=1080:1920:force_original_aspect_ratio=increase,crop=1080:1920,boxblur=20:5,setsar=1[bg];\
               [0:v]scale=1080:1920:force_original_aspect_ratio=decrease,pad=1080:1920:(ow-iw)/2:(oh-ih)/2:black@0,setsar=1[fg];\
               [bg][fg]overlay=0:0[composed];\
               [composed]drawtext=text='Still Moments':fontcolor=white@0.75:fontsize=42:x=w-tw-50:y=h-th-160:shadowcolor=black@0.5:shadowx=2:shadowy=2,\
               fade=t=in:st=0:d=1,fade=t=out:st=${FADEOUT}:d=1.5[out]" \
            -map "[out]" -map "0:a?" \
            -t "$DUR" \
            -c:v libx264 -preset fast -crf 23 \
            -c:a aac -b:a 128k \
            -movflags +faststart \
            -pix_fmt yuv420p \
            final.mp4

          ls -lh final.mp4

      - name: post-to-facebook
        env:
          PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          PAGE_TOKEN: ${{ secrets.FB_PAGE_TOKEN }}
          CAPTION: ${{ github.event.inputs.caption || 'A still moment to breathe.' }}
        run: |
          set -e
          FILE="final.mp4"
          SIZE=$(stat -c%s "$FILE")
          API="https://graph.facebook.com/v19.0"

          INIT=$(curl -sf -X POST "${API}/${PAGE_ID}/videos" \
            -H "Content-Type: application/json" \
            -d "{\"upload_phase\":\"start\",\"file_size\":${SIZE},\"access_token\":\"${PAGE_TOKEN}\"}")

          SESSION=$(echo "$INIT" | jq -r '.upload_session_id')
          VID_ID=$(echo "$INIT"  | jq -r '.video_id')
          S_OFF=$(echo "$INIT"   | jq -r '.start_offset')

          if [ "$SESSION" = "null" ] || [ -z "$SESSION" ]; then
            echo "Upload session failed: $INIT"
            exit 1
          fi

          curl -sf -X POST "${API}/${PAGE_ID}/videos" \
            -F "upload_phase=transfer" \
            -F "upload_session_id=${SESSION}" \
            -F "start_offset=${S_OFF}" \
            -F "video_file_chunk=@${FILE};type=video/mp4" \
            -F "access_token=${PAGE_TOKEN}" > /dev/null

          FINISH=$(curl -sf -X POST "${API}/${PAGE_ID}/videos" \
            -H "Content-Type: application/json" \
            -d "{\"upload_phase\":\"finish\",\"upload_session_id\":\"${SESSION}\",\"description\":\"${CAPTION}\",\"published\":true,\"access_token\":\"${PAGE_TOKEN}\"}")

          OK=$(echo "$FINISH" | jq -r '.success // .id')
          if [ "$OK" = "null" ] || [ -z "$OK" ]; then
            echo "Publish failed: $FINISH"
            exit 1
          fi

          echo "Posted successfully. Video ID: $VID_ID"