name: English Coach Daily Post Eg/ar short les

on:
  schedule:
    # Runs daily at 9:00 AM UTC
    #- cron: '0 9 * * *'
  workflow_dispatch:  # Allows manual triggering

env:
  GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
  PIXABAY_KEY: ${{ secrets.PIXABAY_KEY }}
  FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
  FB_PAGE_TOKEN: ${{ secrets.FB_PAGE_TOKEN }}

jobs:
  generate-and-post:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libraqm0 \
          libraqm-dev \
          pkg-config \
          python3-dev \
          build-essential \
          fontconfig
          
    - name: Install Arabic and Unicode fonts
      run: |
        sudo apt-get install -y \
          fonts-sil-harmattan \
          fonts-noto \
          fonts-noto-cjk \
          fonts-noto-color-emoji \
          fonts-dejavu \
          fonts-liberation \
          fonts-freefont-ttf
          
    - name: Configure font aliases for Arabic
      run: |
        mkdir -p ~/.config/fontconfig
        cat > ~/.config/fontconfig/fonts.conf << 'EOF'
        <?xml version='1.0'?>
        <!DOCTYPE fontconfig SYSTEM 'fonts.dtd'>
        <fontconfig>
          <alias>
            <family>sans-serif</family>
            <prefer>
              <family>Noto Sans Arabic</family>
              <family>Harmattan</family>
              <family>DejaVu Sans</family>
              <family>FreeSans</family>
            </prefer>
          </alias>
          <alias>
            <family>serif</family>
            <prefer>
              <family>Noto Serif Arabic</family>
              <family>DejaVu Serif</family>
              <family>FreeSerif</family>
            </prefer>
          </alias>
          <alias>
            <family>monospace</family>
            <prefer>
              <family>Noto Sans Mono</family>
              <family>DejaVu Sans Mono</family>
              <family>FreeMono</family>
            </prefer>
          </alias>
        </fontconfig>
        EOF
        sudo fc-cache -fv
        
    - name: Verify Arabic font installation
      run: |
        echo "Available Arabic fonts:"
        fc-list :lang=ar | head -10
        echo "Font matching test:"
        fc-match -s ':charset=0620' | head -5
        
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install \
          requests \
          Pillow \
          google-genai \
          arabic-reshaper \
          python-bidi
          
    - name: Run English Coach Script
      run: |
        python shortlessons.py
          
    - name: Upload generated image as artifact
      uses: actions/upload-artifact@v4
      with:
        name: english-tip-image
        path: |
          *.jpg
        retention-days: 7
        if-no-files-found: ignore