name: English Coach Daily Post

on:
  schedule:
    # Runs daily at 9:00 AM UTC
    - cron: '0 9 * * *'
  workflow_dispatch:  # Allows manual triggering

env:
  GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
  PIXABAY_KEY: ${{ secrets.PIXABAY_KEY }}
  FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
  FB_PAGE_TOKEN: ${{ secrets.FB_PAGE_TOKEN }}

jobs:
  generate-and-post:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: Install system dependencies for Arabic fonts
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libraqm0 \
          libraqm-dev \
          pkg-config \
          python3-dev \
          build-essential
          
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install \
          requests \
          Pillow \
          google-genai \
          arabic-reshaper \
          python-bidi
          
    - name: Install Arabic fonts
      run: |
        sudo apt-get install -y \
          fonts-arabic \
          fonts-noto \
          fonts-dejavu \
          fonts-liberation
          
    - name: Run English Coach Script
      run: |
        python shortlessons.py
          
    - name: Upload generated image as artifact
      uses: actions/upload-artifact@v4
      with:
        name: english-tip-image
        path: |
          *.jpg
        retention-days: 7
        if-no-files-found: ignore