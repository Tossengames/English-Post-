name: English Learning Auto Poster

on:
  schedule:
    # Run every 6 hours
    - cron: '0 */6 * * *'
  # Allow manual triggers
  workflow_dispatch:
  # Run on push to main branch for testing
  push:
    branches: [ main ]

jobs:
  post-content:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        
    - name: Debug - List files
      run: |
        echo "=== Repository Contents ==="
        ls -la
        echo "=== Python Files ==="
        find . -name "*.py" -type f
        echo "=== Current Directory ==="
        pwd
        
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: Install system dependencies for Arabic fonts
      run: |
        sudo apt-get update
        sudo apt-get install -y libraqm0 libraqm-dev
        # Install Arabic fonts
        sudo apt-get install -y fonts-noto fonts-noto-cjk fonts-noto-color-emoji fonts-arabeyes
        
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pillow requests google-generativeai arabic-reshaper python-bidi googlesearch-python
        
    - name: Verify installations
      run: |
        python -c "
        try:
            from PIL import Image, ImageDraw, ImageFont
            print('✓ PIL/Pillow installed')
        except ImportError as e:
            print('✗ PIL/Pillow failed:', e)
            
        try:
            import requests
            print('✓ Requests installed')
        except ImportError as e:
            print('✗ Requests failed:', e)
            
        try:
            import google.generativeai as genai
            print('✓ Google Generative AI installed')
        except ImportError as e:
            print('✗ Google Generative AI failed:', e)
            
        try:
            import arabic_reshaper
            from bidi.algorithm import get_display
            print('✓ Arabic text libraries installed')
        except ImportError as e:
            print('✗ Arabic text libraries failed:', e)
            
        try:
            from googlesearch import search
            print('✓ Google search installed')
        except ImportError as e:
            print('✗ Google search failed:', e)
        "
        
    - name: Create test script to verify file existence
      run: |
        echo "#!/usr/bin/env python3" > test_script.py
        echo "import os" >> test_script.py
        echo "print('Current directory:', os.getcwd())" >> test_script.py
        echo "print('Files in directory:')" >> test_script.py
        echo "for file in os.listdir('.'):" >> test_script.py
        echo "    print('  -', file)" >> test_script.py
        echo "if os.path.exists('lessonsarabic.py'):" >> test_script.py
        echo "    print('✓ lessonsarabic.py found!')" >> test_script.py
        echo "else:" >> test_script.py
        echo "    print('✗ lessonsarabic.py NOT found!')" >> test_script.py
        python test_script.py
        
    - name: Run English Learning Script
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        PIXABAY_KEY: ${{ secrets.PIXABAY_KEY }}
        FB_PAGE_TOKEN: ${{ secrets.FB_PAGE_TOKEN }}
        FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
      run: |
        # Check if script exists and run it
        if [ -f "lessonsarabic.py" ]; then
            echo "Running lessonsarabic.py..."
            python lessonsarabic.py
        else
            echo "ERROR: lessonsarabic.py not found!"
            echo "Creating emergency script for testing..."
            cat > emergency_script.py << 'EOF'
#!/usr/bin/env python3
import os
print("Emergency test script")
print("Environment variables check:")
required_vars = ["GEMINI_API_KEY", "PIXABAY_KEY", "FB_PAGE_TOKEN", "FB_PAGE_ID"]
for var in required_vars:
    value = os.environ.get(var)
    if value:
        print(f"✓ {var}: Set")
    else:
        print(f"✗ {var}: Not set")
        
# Test basic functionality
try:
    from PIL import Image, ImageDraw, ImageFont
    print("✓ PIL working")
    
    # Create a simple test image
    img = Image.new('RGB', (100, 100), color='red')
    draw = ImageDraw.Draw(img)
    print("✓ Image creation working")
    
except Exception as e:
    print(f"✗ Image test failed: {e}")
EOF
            python emergency_script.py
            exit 1
        fi
        
    - name: Upload generated image (if any)
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: generated-images
        path: |
          *.jpg
          *.jpeg
          *.png
        retention-days: 1
        
    - name: Upload log files
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: script-logs
        path: |
          posted_content.json
        retention-days: 7

  notify:
    runs-on: ubuntu-latest
    needs: post-content
    if: always()
    
    steps:
    - name: Notify on failure
      if: needs.post-content.result == 'failure'
      run: |
        echo "The English Learning Auto Poster job failed!"
        echo "Check the workflow logs for details."
        
    - name: Notify on success
      if: needs.post-content.result == 'success'
      run: |
        echo "The English Learning Auto Poster job completed successfully!"
        echo "Content should be posted to Facebook."