name: post lessons on jmages arabic
on:
  schedule:
   - cron: '0 12 * * *'  # Runs daily at 12 PM UTC
  workflow_dispatch:       # Allows manual triggering

jobs:
  post-career-advice:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pillow requests google-genai googlesearch-python
        
    - name: Run career post script
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        PIXABAY_KEY: ${{ secrets.PIXABAY_KEY }}
        FB_PAGE_TOKEN: ${{ secrets.FB_PAGE_TOKEN }}
        FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
      run: |
        python lesonsarabic.py