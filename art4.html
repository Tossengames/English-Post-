<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Paint Fill Sync</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 100vw; height: 100vh; overflow: hidden; background: #080808; }
canvas { position: fixed; inset: 0; width: 100%; height: 100%; }
#c-bg { z-index: 0; }
#c-paint { z-index: 1; }
#c-fx { z-index: 2; }
#ui {
  position: fixed; bottom: 24px; left: 0; right: 0;
  text-align: center; font-size: 11px; letter-spacing: 0.2em;
  color: rgba(255,255,255,0.22); font-family: 'Georgia', serif;
  text-transform: uppercase; pointer-events: none; z-index: 5;
}
</style>
</head>
<body>
<canvas id="c-bg"></canvas>
<canvas id="c-paint"></canvas>
<canvas id="c-fx"></canvas>
<div id="ui">Waiting for Start...</div>

<script>
'use strict';

// ═══════════════════════════════════════════════════════
// AUDIO ENGINE
// ═══════════════════════════════════════════════════════
const AC = new (window.AudioContext || window.webkitAudioContext)();
const masterGain = AC.createGain();
masterGain.gain.value = 0.6;
masterGain.connect(AC.destination);

const _audioDest = AC.createMediaStreamDestination();
masterGain.connect(_audioDest);

function sfxStroke(panX, freq, vol) {
  try {
    const pan = AC.createStereoPanner();
    pan.pan.value = Math.max(-1, Math.min(1, panX));
    pan.connect(masterGain);
    const n = AC.sampleRate * 0.12 | 0;
    const buf = AC.createBuffer(1, n, AC.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < n; i++) d[i] = (Math.random()*2-1) * Math.sin(i/n*Math.PI) * 0.8;
    const src = AC.createBufferSource(), g = AC.createGain(), f = AC.createBiquadFilter();
    f.type = 'bandpass'; f.frequency.value = freq || 600; f.Q.value = 1.2;
    g.gain.value = vol || 0.035;
    src.buffer = buf; src.connect(f); f.connect(g); g.connect(pan);
    src.start(); src.stop(AC.currentTime + 0.15);
  } catch(e) {}
}

function sfxSplat(panX, freq) {
  try {
    const pan = AC.createStereoPanner();
    pan.pan.value = Math.max(-1, Math.min(1, panX));
    pan.connect(masterGain);
    const n = AC.sampleRate * 0.08 | 0;
    const buf = AC.createBuffer(1, n, AC.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < n; i++) d[i] = (Math.random()*2-1) * Math.pow(1-i/n, 2.5);
    const src = AC.createBufferSource(), g = AC.createGain(), f = AC.createBiquadFilter();
    f.type = 'bandpass'; f.frequency.value = freq || 800; f.Q.value = 2;
    g.gain.value = 0.06;
    src.buffer = buf; src.connect(f); f.connect(g); g.connect(pan);
    src.start(); src.stop(AC.currentTime + 0.1);
  } catch(e) {}
}

function sfxSwipe(panX) {
  try {
    const pan = AC.createStereoPanner();
    pan.pan.value = Math.max(-1, Math.min(1, panX));
    pan.connect(masterGain);
    const n = AC.sampleRate * 0.2 | 0;
    const buf = AC.createBuffer(1, n, AC.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < n; i++) d[i] = (Math.random()*2-1) * Math.sin(i/n*Math.PI);
    const src = AC.createBufferSource(), g = AC.createGain(), f = AC.createBiquadFilter();
    f.type = 'bandpass'; f.frequency.value = 400 + Math.random()*200; f.Q.value = 0.7;
    g.gain.value = 0.03;
    src.buffer = buf; src.connect(f); f.connect(g); g.connect(pan);
    src.start(); src.stop(AC.currentTime + 0.25);
  } catch(e) {}
}

const _gt = {};
function gate(k, ms, fn) {
  const n = performance.now();
  if (!_gt[k] || n - _gt[k] > ms) { _gt[k] = n; fn(); }
}

// ═══════════════════════════════════════════════════════
// RECORDING API
// ═══════════════════════════════════════════════════════
let _mediaRecorder = null, _recordingChunks = [], _recordingBlob = null;
window._recordingDone = false;

window.startRecording = function(fps) {
  _recordingChunks = []; window._recordingDone = false;
  const composite = document.createElement('canvas');
  composite.width = window.innerWidth; composite.height = window.innerHeight;
  const ctx = composite.getContext('2d');
  const layers = ['c-bg','c-paint','c-fx'].map(id => document.getElementById(id));
  
  const drawLayers = () => {
    ctx.clearRect(0,0,composite.width,composite.height);
    layers.forEach(c => ctx.drawImage(c, 0, 0));
    window._cRaf = requestAnimationFrame(drawLayers);
  };
  drawLayers();

  const stream = composite.captureStream(fps || 30);
  _audioDest.stream.getAudioTracks().forEach(track => stream.addTrack(track));
  
  _mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm;codecs=vp9,opus', videoBitsPerSecond: 8000000 });
  _mediaRecorder.ondataavailable = e => { if(e.data.size > 0) _recordingChunks.push(e.data); };
  _mediaRecorder.onstop = () => { 
    cancelAnimationFrame(window._cRaf);
    _recordingBlob = new Blob(_recordingChunks, { type: 'video/webm' });
    window._recordingDone = true;
  };
  _mediaRecorder.start();
};

window.stopRecording = () => { if(_mediaRecorder) _mediaRecorder.stop(); };
window.getRecordingBase64 = () => {
  return new Promise(resolve => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result.split(',')[1]);
    reader.readAsDataURL(_recordingBlob);
  });
};

// ═══════════════════════════════════════════════════════
// PAINT ENGINE
// ═══════════════════════════════════════════════════════
const cBg=document.getElementById('c-bg'), cPaint=document.getElementById('c-paint'), cFx=document.getElementById('c-fx');
const ctxBg=cBg.getContext('2d'), ctxP=cPaint.getContext('2d'), ctxFx=cFx.getContext('2d');
let W, H;

function resize() {
  W=window.innerWidth; H=window.innerHeight;
  [cBg,cPaint,cFx].forEach(c=>{c.width=W;c.height=H;});
}

function drawBackground(hue) {
  const g=ctxBg.createRadialGradient(W/2,H/2,0,W/2,H/2,Math.max(W,H));
  g.addColorStop(0,`hsl(${hue},15%,7%)`); g.addColorStop(1,`hsl(${(hue+40)%360},10%,3%)`);
  ctxBg.fillStyle=g; ctxBg.fillRect(0,0,W,H);
}

function hsl(h,s,l,a=1) { return `hsla(${h%360},${s}%,${l}%,${a})`; }

function paintAt(x, y, size, hue, hs) {
  hs.v += 0.02;
  const h=(hue+hs.v)%360;
  ctxP.save();
  ctxP.globalAlpha = 0.8;
  const g=ctxP.createRadialGradient(x,y,0,x,y,size);
  g.addColorStop(0, hsl(h, 90, 60));
  g.addColorStop(1, hsl(h, 80, 40, 0));
  ctxP.fillStyle=g;
  ctxP.beginPath(); ctxP.arc(x,y,size,0,Math.PI*2); ctxP.fill();
  ctxP.restore();
}

// (STYLES array remains mostly same, but ensure they use sfx calls)
const STYLES = [
  {
    name: 'Wave Fill',
    init(s, size) { s.y=-size; s.waveAmp=H*0.06; s.waveFreq=3; s.wavePhase=0; s.scanSpeed=H/180; },
    step(s, size, hue, hs, id) {
      if(s.y>H+size) return true;
      s.wavePhase+=0.1; s.y+=s.scanSpeed;
      for(let x=0; x<=W; x+=size*0.7){
        const wy=s.y+Math.sin(x/W*Math.PI*s.waveFreq+s.wavePhase)*s.waveAmp;
        paintAt(x,wy,size,hue,hs);
      }
      gate('wf'+id, 300, () => sfxSwipe(0));
      return false;
    }
  },
  {
    name: 'Spiral',
    init(s, size) { s.cx=W/2; s.cy=H/2; s.ang=0; s.radius=0; s.maxR=Math.max(W,H); s.rSpd=s.maxR/400; },
    step(s, size, hue, hs, id) {
      if(s.radius > s.maxR) return true;
      s.ang += 0.2; s.radius += s.rSpd;
      const x=s.cx+Math.cos(s.ang)*s.radius, y=s.cy+Math.sin(s.ang)*s.radius;
      paintAt(x,y,size,hue,hs);
      gate('sp'+id, 200, () => sfxStroke((x/W)*2-1, 400 + s.radius));
      return false;
    }
  }
  // ... Add your other styles back here ...
];

class Brush {
  constructor(id, hue, styleDef) {
    this.id = id; this.hue = hue; this.hueShiftRef = {v:0}; this.styleDef = styleDef;
    this.size = Math.min(W,H) * 0.07; this.isDone = false;
    this.state = { dir: 1, vdir: 1, x: W/2, y: H/2 };
    styleDef.init(this.state, this.size, id);
  }
  update() { if(!this.isDone) this.isDone = this.styleDef.step(this.state, this.size, this.hue, this.hueShiftRef, this.id); }
}

// ═══════════════════════════════════════════════════════
// MAIN CONTROLLER
// ═══════════════════════════════════════════════════════
let brushes = [], painting = false;

function initSession() {
  resize();
  ctxP.clearRect(0,0,W,H);
  const hue = Math.random()*360;
  drawBackground(hue);
  brushes = [new Brush(0, hue, STYLES[Math.floor(Math.random()*STYLES.length)])];
  document.getElementById('ui').textContent = "Ready to Paint";
}

window.beginPainting = function() {
  painting = true;
  document.getElementById('ui').textContent = brushes[0].styleDef.name;
  loop();
};

function loop() {
  if(!painting) return;
  brushes.forEach(b => b.update());
  if(!brushes.every(b => b.isDone)) requestAnimationFrame(loop);
}

window.addEventListener('DOMContentLoaded', initSession);
document.addEventListener('click', () => { if(!painting) window.beginPainting(); else initSession(); });

</script>
</body>
</html>
